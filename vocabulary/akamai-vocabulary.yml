name: Akamai Domain Vocabulary
provider: Akamai
providerId: akamai
description: Tag-derived vocabulary for the Akamai API surface; sourced from openapi/ tags.
terms:
- term: General configuration settings
  description: Manage security configurations and their versions.
- term: Match targets
  description: 'Manage your match targets, which define which security policy

    applies to an API, hostname, or path.'
- term: Prefetch requests
  description: 'Manage your prefetch request protections.  When enabled, your

    application firewall rules inspect internal requests, which are

    those between your origin and Akamai''s servers, for the file

    types you specify.'
- term: 'Shared resources: Rate policies'
  description: Manage rate policies for security configurations.
- term: SIEM settings
  description: Manage SIEM settings for your security configurations.
- term: URL protection policies
  description: Manage your URL protection policies.
- term: Hostnames
  description: Manage the hostnames in your configuration settings.
- term: 'Shared resources: Malware policies'
  description: Manage your malware policies.
- term: 'Shared resources: Custom rules'
  description: Manage your custom rules for security configurations and policies.
- term: PII learning
  description: 'Manage settings for Personally Identifiable Information (PII)

    learning. With this feature, the network discovers PII on your

    behalf.'
- term: 'Shared resources: Custom deny actions'
  description: 'Manage your custom deny actions for security configurations and

    policies.  Custom deny actions let you serve error messages,

    pages, and responses that meet your organization''s unique needs.'
- term: Bypass network lists
  description: Manage the bypass network lists used with your security policies.
- term: Failover hostnames
  description: Get a list of the failover hostnames in a security configuration.
- term: 'Shared resources: Reputation profiles'
  description: 'Manage your reputation profiles.  Reputation protections

    identify potentially malicious IP addresses, scoring them based

    on prior interactions with other Akamai customers.'
- term: Request body size
  description: 'Manage a security configuration''s inspection limit settings for

    request bodies.'
- term: General policy settings
  description: Manage security policies and their versions.
- term: Rate policy actions
  description: 'Manage rate policy actions, which are the actions each policy

    takes when conditions are met.'
- term: IP/Geo Firewall settings
  description: 'Manage which network lists are used in the IP/Geo Firewall

    settings.  If you want to add or remove IP addresses from the

    network lists, use the Network Lists API.'
- term: Attack payload logs
  description: 'Manage the attack payload log settings for your security

    configurations.'
- term: HTTP header logs
  description: Manage the HTTP header log settings for security policies.
- term: Client reputation
  description: Manage your client reputation profiles.
- term: Custom rule actions
  description: 'Manage the actions contained in your custom rules.  Use custom

    rules to handle scenarios not covered by the included standard

    rules or to quickly patch new website vulnerabilities.'
- term: Reputation analysis
  description: 'If using Kona Site Defender, manage the reputation analysis

    settings.'
- term: URL protection policy actions
  description: Manage your URL protection settings for your security policies.
- term: Pragma settings
  description: Manage the Pragma header settings for your security policies.
- term: API request constraints
  description: 'Manage API request limits and the actions to take when those

    limits are met.'
- term: Evasive path match
  description: Manage the evasive path match for your security configurations.
- term: Malware policy actions
  description: Manage the actions taken by your malware policies.
- term: Request body inspection limits
  description: Manage limits for the maximum request body size allowed.
- term: API endpoints
  description: Get the list of API endpoints associated with a security policy.
- term: Slow POST protections
  description: 'Manage your slow POST protection settings for your security

    policies.'
- term: 'WAF rules: General settings'
  description: Manage your Web Application Firewall (WAF) rules and rule sets.
- term: Protections
  description: 'Manage various security policy protections.  These settings

    enable or disable each protection on your policy.  However, you

    set the protections themselves in their corresponding operations

    available in this API.'
- term: 'WAF rules: Penalty box'
  description: 'Manage the penalty box settings for your Web Application

    Firewall implementation.'
- term: 'WAF rules: Penalty box conditions'
  description: 'Manage the conditions used with your Web Application Firewall''s

    penalty box.'
- term: 'WAF rules: Tuning recommendations'
  description: Manage the tuning recommendations for your WAF attack groups.
- term: 'WAF rules: Attack groups'
  description: Manage your WAF attack groups.
- term: 'WAF rules: Update mode'
  description: 'Manage the mode used with your WAF rules. Your mode you set

    determines how your rule sets are updated.'
- term: 'WAF rules: Rapid rules'
  description: 'Quickly manage and mitigate risks resulting from the most recent high-profile, critical vulnerabilities.

    __Note__. Rapid rules are rules you can apply while we are still testing and perfecting them. Once we finish that process,
    a rapid rule becomes a WAF rule.'
- term: 'Security policy: Conditions and exceptions'
  description: 'Manage the attack groups and rules that you''re currently evaluating

    for your security policies.'
- term: 'Security policy: Evaluation hostnames'
  description: Manage hostnames you're currently evaluating for security policies.
- term: 'Security policy: Evaluation mode'
  description: 'Set the evaluation mode for your security policies.  This mode

    runs concurrently with your existing Web Application Firewall

    Rule settings and records how the rules would respond if applied

    to live traffic.'
- term: 'Security policy: Evaluation penalty box'
  description: 'Manage the penalty box settings that you''re evaluating for your

    security policies.'
- term: 'Security policy: Evaluation rules'
  description: 'Manage the rules you''re currently evaluating for security

    policies.'
- term: 'Security policy: Evaluation attack groups'
  description: 'Manage the attack groups that you''re evaluating for your

    security configurations and policies.'
- term: 'WAF rules: Evaluation Penalty box conditions'
  description: 'Manage the penalty box condition settings for your firewall

    rules.'
- term: 'Configuration: Evaluation hostnames'
  description: 'Manage hostnames you''re currently evaluating for a configuration

    version.  If using Web Application Protector, manage hostnames

    currently in evaluation mode.  This mode lets you to see how

    your configuration settings protect a hostname''s traffic before

    adding the hostname to a live configuration.'
- term: Activations
  description: Manage your security configuration activations.
- term: Configuration version export
  description: 'Get comprehensive details about a security configuration

    version.'
- term: Activation history
  description: Get the activation history for a configuration.
- term: Activation status
  description: 'Get status information about your activations and activation

    requests.'
- term: Discovered APIs
  description: 'Get information about APIs discovered in your traffic that are

    new or not yet protected under API protections.'
- term: Subscriptions
  description: 'Manage the email subscriptions for features within a specific

    security configuration.'
- term: Endpoints
  description: Manage the API endpoints associated with a security policy.
- term: Contracts and groups
  description: List the contracts and groups for your account.
- term: Available hostnames
  description: List all hostnames for a given contract and group.
- term: Hostname coverage
  description: 'Get the list of hostnames in an account with their current

    protections, activation statuses, and other summary information.'
- term: CVE Protections lookup
  description: See which CVEs are covered by App & API Protector. The catalog contains only CVEs that the Akamai Threat Research
    team is aware of. App & API Protector can identify and block attacks related to the active exploitation of many more CVEs
    and attacks without associated known vulnerabilities.
- term: 'Onboarding: Creation and settings'
  description: Manage onboardings and their settings.
- term: 'Onboarding: Activations and status'
  description: Manage your onboardings' activations, and the activation history for each onboarding.
- term: 'Onboarding: Post-activation validation'
  description: Manage your post-activation validations and CNAME your hostnames to Akamai in order to go live.
