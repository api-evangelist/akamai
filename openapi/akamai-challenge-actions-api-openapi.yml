                challengeType: AKAMAI_WEB_CRYPTO
                cryptoChallengeDurationInSeconds: 100
                customBrandingUrl: /abcd.html
              schema:
                additionalProperties: false
                properties:
                  actionId:
                    description: __Read-only__ Identifies the action.
                    readOnly: true
                    type: string
