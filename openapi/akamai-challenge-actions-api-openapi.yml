  /configs/{configId}/versions/{versionNumber}/response-actions/challenge-actions/{actionId}:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    - description: Identifies the action.
      in: path
      name: actionId
      required: true
      schema:
        example: challenge_12345
        type: string
      x-akamai:
        file-path: parameters/action-id.yaml
    x-akamai:
      file-path: paths/challenge-action.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/response-actions/challenge-actions/{actionId}
