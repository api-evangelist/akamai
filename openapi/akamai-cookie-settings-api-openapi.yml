paths:
  /configs/{configId}/versions/{versionNumber}/advanced-settings/cookie-settings:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    x-akamai:
      file-path: paths/config-cookie-settings.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/advanced-settings/cookie-settings
    get:
      description: __All products__ Returns cookie settings for a configuration. Contact your account team if you'd like to run this operation.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-advanced-settings-cookie-settings
      operationId: get-advanced-settings-cookie-settings
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                cookieDomain: automatic
                useAllSecureTraffic: true
              schema:
                additionalProperties: false
                description: Contains the cookie settings for a configuration.
                properties:
                  cookieDomain:
                    description: Choose the type of domain. The default recommended type is `automatic`. Otherwise, choose `fqdn` to use the current Fully Qualified Domain name, `legacy` to use the original way in which the domain was selected, or `psl` to use the public suffix list to identify a private domain.
                    enum:
                    - automatic
                    - fqdn
                    - legacy
                    - psl
                    type: string
                  useAllSecureTraffic:
                    description: If all of your traffic uses HTTPS, specify `true`. This option sets the Secure flag on all security product cookies, which are then only included with HTTPS traffic. It also adds `SameSite=None` to most bot management cookies, ensuring that recent browser versions submit the cookies with protected requests. The `SameSite=None` cookie setting is necessary for site architectures that involve cross-domain form submission or inclusion of cross-domain iframes.
                    type: boolean
                type: object
                x-akamai:
                  file-path: schemas/cookie-settings.yaml
          description: Successfully retrieved the cookie settings.
        '400':
          content:
            application/json:
              example:
