                extensions:
                  description: List of extensions.
                  items:
                    type: string
                  type: array
              type: object
              x-akamai:
                file-path: schemas/prefetch-request-put.yaml
        required: true
      responses:
        '200':
          content:
            application/json:
              example:
                allExtensions: false
                enableAppLayer: true
                enableRateControls: false
                extensions:
