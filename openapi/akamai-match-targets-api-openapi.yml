        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      requestBody:
        content:
          application/json:
            example:
              bypassNetworkLists:
              - id: 888518_ACDDCKERS
              - id: 1304427_AAXXBBLIST
              defaultFile: NO_MATCH
              fileExtensions:
              - wmls
              - jpeg
              - pws
              - carb
              - pdf
              - js
              - hdml
              - cct
              - swf
              - pct
              filePaths:
