                    quicEnabled: false
                    secureNetwork: enhanced-tls
                    sniOnly: true
                    disallowedTlsVersions:
                    - TLSv1
                    - TLSv1_1
                    clientMutualAuthentication:
                      setId: Custom_CPS-6134b_B-3-1AHBENT.xml
                      authenticationOptions:
                        sendCaListToClient: false
                        ocsp:
                          enabled: false
                    dnsNameSettings:
                      cloneDnsNames: false
                      dnsNames:
                      - san2.example.com
