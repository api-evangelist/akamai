openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Protections API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: 'Manage various security policy protections.  These settings

    enable or disable each protection on your policy.  However, you

    set the protections themselves in their corresponding operations

    available in this API.'
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: 'Manage various security policy protections.  These settings

    enable or disable each protection on your policy.  However, you

    set the protections themselves in their corresponding operations

    available in this API.'
  name: Protections
paths:
  /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/protections:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    - description: A unique identifier for a security policy.
      in: path
      name: policyId
      required: true
      schema:
        example: boBF_19288
        type: string
      x-akamai:
        file-path: parameters/policy-id-path.yaml
    x-akamai:
      file-path: paths/policy-protections.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/protections
    get:
      description: __All products__ Get the protections and whether they are enabled or disabled in a security policy.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-policy-protections
      operationId: get-policy-protections
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                applyApiConstraints: true
                applyApplicationLayerControls: true
                applyMalwareControls: true
                applyNetworkLayerControls: true
                applyRateControls: true
                applyReputationControls: true
                applySlowPostControls: true
              schema:
                additionalProperties: false
                description: These settings enable or disable each protection on your policy. However, you set the protections themselves in their corresponding operations available in this API.
                properties:
                  applyApiConstraints:
                    description: When enabled, this protection responds to triggers with a specified action.
                    type: boolean
                  applyApplicationLayerControls:
                    description: When enabled, your security policy applies the Web Application Firewall controls to your traffic.
                    type: boolean
                  applyCpcControls:
                    default: false
                    description: When enabled, your security policy applies Client-Side Protection & Compliance controls to your match target.
                    type: boolean
                  applyMalwareControls:
                    description: When enabled, your security policy applies file malware scanning controls to your traffic.
                    type: boolean
                  applyNetworkLayerControls:
                    description: When enabled, your security policy applies the network layer control settings to your traffic.
                    type: boolean
                  applyRateControls:
                    description: When enabled, your security policy applies the rate control settings to your traffic. Rate controls monitor and flag traffic too fast to be from a human.
                    type: boolean
                  applyReputationControls:
                    description: When enabled, your security policy applies the reputation profile settings to your traffic. Reputation profile analyses IP addresses based on their prior interactions with Akamai customers, then alerts on or blocks potentially malicious IP addresses from issuing requests.
                    type: boolean
                  applySlowPostControls:
                    description: When enabled, your security policy applies slow POST controls to your traffic.
                    type: boolean
                type: object
                x-akamai:
                  file-path: schemas/security-policy-protections.yaml
          description: Successfully retrieved the security policy protections.
