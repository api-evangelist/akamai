  description: Manage the bypass network lists used with your security policies.
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: Manage the bypass network lists used with your security policies.
  name: Bypass network lists
paths:
  /configs/{configId}/versions/{versionNumber}/bypass-network-lists:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    x-akamai:
      file-path: paths/config-bypass-network-lists.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/bypass-network-lists
    get:
      description: __Web Application Protector__ Lists which network lists are used in the bypass network lists settings. If you want to add or remove IP addresses from the network lists, use the [Network Lists API](https://techdocs.akamai.com/network-lists/reference/api).
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-bypass-network-lists
      operationId: get-bypass-network-lists
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                networkLists:
                - id: 888518_ACDDCKERS
                  name: Test network list 1
                - id: 1304427_AAXXBBLIST
                  name: Test network list 2
              schema:
                additionalProperties: false
                description: Contains bypass network lists for the specified configuration version.
                properties:
                  networkLists:
                    description: The list of network list identifiers and names.
                    items:
                      additionalProperties: false
                      properties:
                        id:
                          description: Uniquely identifies the network list.
                          type: string
                        name:
                          description: The name of the network list.
                          type: string
                      required:
                      - id
                      type: object
                    type: array
                required:
                - networkLists
                type: object
                x-akamai:
                  file-path: schemas/bypass-network-lists-get.yaml
          description: Successfully retrieved the bypass network lists settings.
        '400':
          content:
            application/problem+json:
              example:
