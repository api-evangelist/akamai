                    description: Adds a value indicating that shared IPs are included in HTTP header and SIEM integration when used.
                    type: boolean
                  forwardToHTTPHeader:
                    description: Adds client reputation details to requests forwarded to origin in an HTTP header.
                    type: boolean
                type: object
                x-akamai:
                  file-path: schemas/reputation-analysis-settings-put-200.yaml
