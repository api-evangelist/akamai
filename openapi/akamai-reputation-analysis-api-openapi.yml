  description: 'If using Kona Site Defender, manage the reputation analysis

    settings.'
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: 'If using Kona Site Defender, manage the reputation analysis

    settings.'
  name: Reputation analysis
paths:
  /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/reputation-analysis:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    - description: A unique identifier for a security policy.
      in: path
      name: policyId
      required: true
      schema:
        example: boBF_19288
        type: string
      x-akamai:
        file-path: parameters/policy-id-path.yaml
    x-akamai:
      file-path: paths/policy-reputation-analysis.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/reputation-analysis
    get:
      description: __Kona Site Defender__ Return the current reputation analysis settings.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-reputation-analysis
      operationId: get-reputation-analysis
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                forwardSharedIPToHTTPHeaderAndSIEM: true
                forwardToHTTPHeader: true
              schema:
                additionalProperties: false
                description: The GET Response JSON for reputation analysis settings.
                properties:
                  forwardSharedIPToHTTPHeaderAndSIEM:
                    description: Adds a value indicating that shared IPs are included in HTTP header and SIEM integration when used.
                    type: boolean
                  forwardToHTTPHeader:
                    description: Adds client reputation details to requests forwarded to origin in an HTTP header.
                    type: boolean
                type: object
                x-akamai:
                  file-path: schemas/reputation-analysis-settings-get-200.yaml
          description: Successfully retrieved the reputation analysis settings.
        '400':
          content:
            application/json:
              example:
                detail: The request could not be understood by the server due to malformed syntax.
