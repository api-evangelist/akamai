    put:
      description: __Kona Site Defender__ Toggle the `forwardToHTTPHeader` and `forwardSharedIPToHTTPHeaderAndSIEM` options. The `forwardToHTTPHeader` option adds client reputation details to requests forwarded to origin in an HTTP header. The `forwardSharedIPToHTTPHeaderAndSIEM` option adds a value indicating that shared IPs are included in HTTP header and SIEM integration when used.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/put-reputation-analysis
      operationId: put-reputation-analysis
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      requestBody:
        content:
          application/json:
            example:
              forwardSharedIPToHTTPHeaderAndSIEM: true
              forwardToHTTPHeader: true
            schema:
              additionalProperties: false
              description: The PUT Request JSON for reputation analysis settings.
              properties:
                forwardSharedIPToHTTPHeaderAndSIEM:
                  description: Whether to enable the option to add value indicating that shared IPs are included in HTTP header and SIEM integration when used.
                  type: boolean
                forwardToHTTPHeader:
                  description: Whether to enable the option to add client reputation details to requests forwarded to origin in an HTTP header.
                  type: boolean
              type: object
              x-akamai:
                file-path: schemas/reputation-analysis-settings-put.yaml
        required: true
      responses:
        '200':
