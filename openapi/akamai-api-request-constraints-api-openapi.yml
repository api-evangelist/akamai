openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens API request constraints API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: 'Manage API request limits and the actions to take when those

    limits are met.'
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: 'Manage API request limits and the actions to take when those

    limits are met.'
  name: API request constraints
paths:
  /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/api-request-constraints:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    - description: A unique identifier for a security policy.
      in: path
      name: policyId
      required: true
      schema:
        example: boBF_19288
        type: string
      x-akamai:
        file-path: parameters/policy-id-path.yaml
    x-akamai:
      file-path: paths/policy-api-request-constraints.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/api-request-constraints
    get:
      description: __Kona Site Defender__, __App & API Protector with the Advanced Security module__ Return a list of APIs with their constraints and associated actions.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-api-request-constraints
      operationId: get-api-request-constraints
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                apiEndpoints:
                - action: alert
                  id: 1941
                - action: alert
                  id: 1942
                - action: alert
                  id: 1943
              schema:
                additionalProperties: false
                description: The Response JSON for API Request Constraints action.
                properties:
                  apiEndpoints:
                    description: The list of API match targets action set in the security policy.
                    items:
                      additionalProperties: false
                      properties:
                        action:
                          description: The action to take for the requests that violate the constraints.
                          type: string
                        id:
                          description: Uniquely identifies the API match target.
                          type: integer
                      required:
                      - action
                      - id
                      type: object
                    type: array
                required:
                - apiEndpoints
                type: object
                x-akamai:
                  file-path: schemas/api-request-constraints-action-200.yaml
          description: Successfully retrieved API match target actions.
