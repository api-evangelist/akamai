      summary: List API request constraints and actions
      tags:
      - API request constraints
      x-akamai:
        labels:
        - Kona Site Defender
        - App & API Protector with the Advanced Security module
    put:
      description: __Kona Site Defender__, __App & API Protector with the Advanced Security module__ Update what action to take when any API request constraint triggers. Use `alert` to record the trigger of the event, `deny` to block the request, or `customDenyId` to apply a custom deny response.
