openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Client reputation API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: Manage your client reputation profiles.
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: Manage your client reputation profiles.
  name: Client reputation
paths:
  /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/reputation-profiles:
