        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                reputationProfiles:
                - action: alert
                  id: 102718
                - action: deny
                  id: 102719
              schema:
                additionalProperties: false
                description: The GET Response JSON for reputation profile actions.
                properties:
                  reputationProfiles:
                    description: The list of reputation profile actions. Use `alert` to record the trigger of the event, `deny` to block the request, or `none` to take no action. Use `deny_custom_{custom_deny_id}` to apply a custom action instead of Akamai's default. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions.
                    items:
                      additionalProperties: false
                      description: Reputation Profile JSON Properties.
                      properties:
                        action:
                          description: The action for the reputation profile. Use `alert` to record the trigger of the event, `deny` to block the request, or `none` to take no action. Use `deny_custom_{custom_deny_id}` to apply a custom action instead of Akamai's default. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions.
                          enum:
                          - alert
                          - deny
                          - none
