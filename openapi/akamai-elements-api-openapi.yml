openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Elements API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- name: Elements
paths:
  /network-lists/{networkListId}/elements:
    parameters:
    - description: Unique identifier for each network list.
      example: '{{networkListId}}'
      in: path
      name: networkListId
      required: true
      schema:
        example: 12345_BLACKLISTEDGEOS
        type: string
      x-akamai:
        file-path: parameters/networkListId-path.yaml
    put:
      description: Adds the specified `element` to the list.  If the network list's `type` is `IP`, the value needs to be a URL-encoded IP address or CIDR block. If the type is `GEO`, it's a two-character country code. (See the [EdgeScape Documentation](https://control.akamai.com/apps/download-center/#/products/3;name=EdgeScape)) for more information. For a list of countries, go to __Data Codes__ &rArr; __Country Code__.)
      operationId: put-network-list-elements
      summary: Akamai Add an Element
      tags:
      - Elements
      externalDocs:
        description: See documentation for this operation in Akamai's Network Lists API
        url: https://techdocs.akamai.com/network-lists/reference/put-network-list-elements
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              example:
                contractId: K-0N7RAK71
                elementCount: 13
                groupId: 517014
                name: My Network List
                networkListType: networkListResponse
                readOnly: true
                shared: true
                syncPoint: 65
                type: IP
                uniqueId: 1024_NETWORKLIST
                list:
                - 192.0.2.228/24
                - 12.129.0.0/15
                - 12.211.0.0/15
                - 192.0.2.237/24
                - 192.0.2.214/24
                - 12.231.0.0/14
                - 12.235.0.0/14
                - 192.0.2.76/24
                - 192.0.2.47/24
                - 192.0.2.148/24
                - 192.0.2.169/24
                - 192.0.2.159/24
                - 192.0.2.80/24
                links:
                  activateInProduction:
                    href: /network-list/v2/network-lists/1024_AMAZONELASTICCOMPUTECLOU/environments/PRODUCTION/activate
                    method: POST
                  activateInStaging:
                    href: /network-list/v2/network-lists/1024_AMAZONELASTICCOMPUTECLOU/environments/STAGING/activate
                    method: POST
                  appendItems:
                    href: /network-list/v2/network-lists/1024_AMAZONELASTICCOMPUTECLOU/append
                    method: POST
                  retrieve:
                    href: /network-list/v2/network-lists/1024_AMAZONELASTICCOMPUTECLOU
                  statusInProduction:
                    href: /network-list/v2/network-lists/1024_AMAZONELASTICCOMPUTECLOU/environments/PRODUCTION/status
                  statusInStaging:
                    href: /network-list/v2/network-lists/1024_AMAZONELASTICCOMPUTECLOU/environments/STAGING/status
                  update:
                    href: /network-list/v2/network-lists/1024_AMAZONELASTICCOMPUTECLOU
                    method: PUT
              schema:
                additionalProperties: false
                description: Encapsulates information about each network list.
                type: object
                required:
                - name
                - syncPoint
                - type
                - uniqueId
                properties:
                  accessControlGroup:
                    description: Name of this network list's access control group (ACG).
                    type: string
                  contractId:
                    description: Identifies the contract where you want to create the list. You need to have write access to the contract you specify. If you include a `contractId`, you need to pair it with a `groupId`.
                    maxLength: 20
                    minLength: 5
                    type: string
                  createDate:
                    description: ISO 8601 timestamp indicating when the network list was first created. Available only when using the `extended` query parameter to retrieve network list data.
                    example: '2017-06-01T15:13:40.36Z'
                    format: date-time
                    type: string
                  createdBy:
                    description: Username of this list's creator. Available only when using the `extended` query parameter to retrieve network list data.
                    type: string
                  description:
                    description: Detailed description of the list.
                    maxLength: 255
                    minLength: 1
                    type: string
                  elementCount:
                    description: Reflects the number of elements in the `list` array, which may not necessarily appear in the object when retrieving the list with the `includeElements` query parameter set to `false`.
                    type: integer
                  expeditedProductionActivationStatus:
                    description: For clients with access to _expedited_ activations on select servers, provides the most recent activation status in the `PRODUCTION` environment. See [Activation States](https://techdocs.akamai.com/network-lists/reference/activation-states) for details on each activation state. Available only when using the `extended` query parameter to retrieve network list data.
                    example: INACTIVE
                    type: string
                    enum:
                    - INACTIVE
                    - ACTIVE
                    - MODIFIED
                    - PENDING_ACTIVATION
                    - FAILED
                    - PENDING_DEACTIVATION
                  expeditedStagingActivationStatus:
                    description: For clients with access to _expedited_ activations on select servers, provides the most recent activation status in the `STAGING` environment. See [Activation States](https://techdocs.akamai.com/network-lists/reference/activation-states) for details on each activation state. Available only when using the `extended` query parameter to retrieve network list data.
                    example: INACTIVE
                    type: string
                    enum:
                    - INACTIVE
                    - ACTIVE
                    - MODIFIED
                    - PENDING_ACTIVATION
                    - FAILED
                    - PENDING_DEACTIVATION
                  groupId:
                    description: Identifies the group where you want to create the list. You need to have write access to the group you specify. If you include a `groupId`, you need to pair it with a `contractId`.
                    type: number
                  links:
                    additionalProperties: false
                    description: Encapsulates the set of [API hypermedia](https://techdocs.akamai.com/network-lists/reference/api-hypermedia) to access a set of resources related to this network list. The object is arranged as a hash of keys, each of which represents a link relation.
                    type: object
                    properties:
                      activateInProduction:
                        additionalProperties: false
                        description: A link to [Activate a network list](https://techdocs.akamai.com/network-lists/reference/post-network-list-activate) in the `PRODUCTION` environment.
                        type: object
                        required:
                        - href
                        properties:
                          detail:
                            description: Any additional information about the target of the link.
                            type: string
                          href:
                            description: URL to access or perform the action on a related resource. May be expressed as an absolute server path, or relative to the current URL call.
                            type: string
                          method:
                            default: GET
                            description: The HTTP method with which to call the `href`, `GET` by default.
                            type: string
                        x-akamai:
                          file-path: schemas/link.yaml
                      activateInStaging:
                        additionalProperties: false
                        description: A link to [Activate a network list](https://techdocs.akamai.com/network-lists/reference/post-network-list-activate) in the `STAGING` environment.
                        type: object
                        required:
                        - href
                        properties:
                          detail:
                            description: Any additional information about the target of the link.
                            type: string
                          href:
                            description: URL to access or perform the action on a related resource. May be expressed as an absolute server path, or relative to the current URL call.
                            type: string
                          method:
                            default: GET
                            description: The HTTP method with which to call the `href`, `GET` by default.
                            type: string
                        x-akamai:
                          file-path: schemas/link.yaml
                      activationDetails:
                        additionalProperties: false
                        description: A link to [Get activation details](https://techdocs.akamai.com/network-lists/reference/get-activation).
                        type: object
                        required:
                        - href
                        properties:
                          detail:
                            description: Any additional information about the target of the link.
                            type: string
                          href:
                            description: URL to access or perform the action on a related resource. May be expressed as an absolute server path, or relative to the current URL call.
                            type: string
                          method:
                            default: GET
                            description: The HTTP method with which to call the `href`, `GET` by default.
                            type: string
                        x-akamai:
                          file-path: schemas/link.yaml
                      appendItems:
                        additionalProperties: false
                        description: A link to [Append elements to a network list](https://techdocs.akamai.com/network-lists/reference/post-network-list-append).
                        type: object
                        required:
                        - href
                        properties:
                          detail:
                            description: Any additional information about the target of the link.
                            type: string
                          href:
                            description: URL to access or perform the action on a related resource. May be expressed as an absolute server path, or relative to the current URL call.
                            type: string
                          method:
