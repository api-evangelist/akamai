      parameters:
      - description: Specifies the element to add to the network list.
        example: '{{element}}'
        in: query
        name: element
        required: true
        schema:
          example: 192.0.2.0/24
          type: string
        x-akamai:
          file-path: parameters/element-query.yaml
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        example: '{{accountSwitchKey}}'
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
    delete:
      description: Removes the specified `element` from the list.  If the network list's `type` is `IP`, the value is a URL-encoded IP address or CIDR block. If the type is `GEO`, it's a two-character country code.
      operationId: delete-network-list-elements
      summary: Akamai Remove an Element
      tags:
      - Elements
      externalDocs:
        description: See documentation for this operation in Akamai's Network Lists API
        url: https://techdocs.akamai.com/network-lists/reference/delete-network-list-elements
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              example:
                contractId: K-0N7RAK71
                elementCount: 13
                groupId: 517014
                name: My Network List
