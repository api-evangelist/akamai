                        type: object
                        required:
                        - href
                        properties:
                          detail:
                            description: Any additional information about the target of the link.
                            type: string
                          href:
                            description: URL to access or perform the action on a related resource. May be expressed as an absolute server path, or relative to the current URL call.
                            type: string
                          method:
                            default: GET
                            description: The HTTP method with which to call the `href`, `GET` by default.
                            type: string
                        x-akamai:
                          file-path: schemas/link.yaml
                      update:
                        additionalProperties: false
                        description: A link to [Update a network list](https://techdocs.akamai.com/network-lists/reference/put-network-list).
                        type: object
                        required:
                        - href
                        properties:
                          detail:
                            description: Any additional information about the target of the link.
                            type: string
                          href:
                            description: URL to access or perform the action on a related resource. May be expressed as an absolute server path, or relative to the current URL call.
                            type: string
                          method:
                            default: GET
                            description: The HTTP method with which to call the `href`, `GET` by default.
                            type: string
                        x-akamai:
                          file-path: schemas/link.yaml
                  list:
                    description: Defines the network list's set of elements. If the `type` is `IP`, values are any combination of IPv4 addresses, IPv6 addresses, or CIDR blocks. If the `type` is `GEO`, values are ISO 3166 two-character country codes. This array does not appear in the object if you get it with the `includeElements` query parameter set to `false`.
                    type: array
                    items:
                      example: FR
                      minLength: 0
                      type: string
                  name:
                    description: Display name of the network list.
                    maxLength: 100
                    minLength: 1
                    type: string
                  networkListType:
                    description: If set to `extendedNetworkListResponse`, indicates that the current data features members enabled with the `extended` query parameter. Otherwise a plain `networkListResponse` value indicates this additional data is absent.
                    example: extendedNetworkListResponse
                    type: string
                    enum:
                    - networkListResponse
                    - extendedNetworkListResponse
                  productionActivationStatus:
                    description: The most recent activation status of the current list in the `PRODUCTION` environment.  See [Activation States](https://techdocs.akamai.com/network-lists/reference/activation-states) for details on each activation state. Available only when using the `extended` query parameter to retrieve network list data.
                    example: INACTIVE
                    type: string
                    enum:
                    - INACTIVE
                    - ACTIVE
                    - MODIFIED
                    - PENDING_ACTIVATION
                    - FAILED
                    - PENDING_DEACTIVATION
                  readOnly:
                    default: false
                    description: If `true`, indicates that you don't have permission to modify the network list. This may indicate either a network list that Akamai manages, or insufficient permission for your API client's identity to modify a customer-managed list. The default value is `false`.
                    type: boolean
                  shared:
                    default: false
                    description: Indicates if this list has been shared with you by Akamai or some other account. Shared lists are always read-only.
                    type: boolean
                  stagingActivationStatus:
                    description: The most recent activation status of the current list in the `STAGING` environment. See [Activation States](https://techdocs.akamai.com/network-lists/reference/activation-states) for details on each activation state. Available only when using the `extended` query parameter to retrieve network list data.
                    example: INACTIVE
                    type: string
                    enum:
                    - INACTIVE
                    - ACTIVE
                    - MODIFIED
                    - PENDING_ACTIVATION
                    - FAILED
                    - PENDING_DEACTIVATION
                  syncPoint:
                    default: 0
                    description: Identifies each version of the network list, which increments each time it's modified. You need to include this value in any requests to modify the list. See [Concurrency control](https://techdocs.akamai.com/network-lists/reference/concurrency-control) for details.
                    minimum: 0
                    type: integer
                  type:
                    description: The network list type, either `IP` for IP addresses and CIDR blocks, or `GEO` for two-letter country codes.
                    type: string
                    enum:
                    - IP
                    - GEO
                  uniqueId:
                    description: A unique identifier for each network list, corresponding to the `networkListId` URL parameter.
                    minLength: 3
                    readOnly: true
                    type: string
                  updateDate:
                    description: ISO 8601 timestamp indicating when the network list was last modified. Available only when using the `extended` query parameter to retrieve network list data.
                    example: '2017-06-01T15:13:40.36Z'
                    format: date-time
                    type: string
                  updatedBy:
                    description: Username of this list's creator. Available only when using the `extended` query parameter to retrieve network list data.
                    type: string
                x-akamai:
                  file-path: schemas/retrieve.yaml
        '400':
          description: Incorrect client input. See the field errors provided in the response for more information.  This error may also be returned in place of a 404 if a URL parameter was provided in an incorrect format.
