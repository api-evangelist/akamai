openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens HTTP header logs API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: Manage the HTTP header log settings for security policies.
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: Manage the HTTP header log settings for security policies.
  name: HTTP header logs
paths:
  /configs/{configId}/versions/{versionNumber}/advanced-settings/logging:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    x-akamai:
      file-path: paths/config-logging.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/advanced-settings/logging
    get:
      description: __All products__ Lists HTTP header logging controls for a configuration. HTTP header logging is on by default, and in most cases you should leave it enabled. You can filter requests by header type, including or excluding requests with a specific header, or by cookie. This operation applies at the configuration level, and therefore applies to all policies within a configuration. If you want to view these settings for a specific policy, run [Get HTTP header log settings](https://techdocs.akamai.com/application-security/reference/get-policies-logging).
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-advanced-settings-logging
      operationId: get-advanced-settings-logging
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                allowSampling: true
                cookies:
                  type: all
                customHeaders:
                  type: exclude
                  values:
                  - csdasdad
                standardHeaders:
                  type: only
                  values:
                  - Accept
              schema:
                additionalProperties: false
                description: The GET Response JSON for HTTP Header Logging.
                properties:
                  allowSampling:
                    description: Enables HTTP Header logging.
                    type: boolean
                  cookies:
                    additionalProperties: false
                    description: Settings for cookie headers.
                    properties:
                      type:
                        description: Use `all` to log headers for all requests with any standard header. Use `none` to exclude headers for any requests with any standard header from logging. Use `exclude` to exclude headers for requests with specific standard headers. Use `only` to include headers for requests with specific standard headers.
                        enum:
                        - all
                        - none
                        - exclude
                        - only
                        type: string
                      values:
                        description: List of headers to include or exclude depending on the `type` setting.
                        items:
                          type: string
                        type: array
                    required:
                    - type
                    type: object
                    x-akamai:
                      file-path: schemas/logging-header-setting.yaml
                  customHeaders:
                    additionalProperties: false
                    description: Settings for custom headers.
                    properties:
                      type:
                        description: Use `all` to log headers for all requests with any standard header. Use `none` to exclude headers for any requests with any standard header from logging. Use `exclude` to exclude headers for requests with specific standard headers. Use `only` to include headers for requests with specific standard headers.
                        enum:
                        - all
                        - none
                        - exclude
                        - only
                        type: string
                      values:
                        description: List of headers to include or exclude depending on the `type` setting.
                        items:
                          type: string
                        type: array
                    required:
                    - type
                    type: object
                    x-akamai:
                      file-path: schemas/logging-header-setting.yaml
                  standardHeaders:
                    additionalProperties: false
                    description: Settings for standard headers.
                    properties:
                      type:
                        description: Use `all` to log headers for all requests with any standard header. Use `none` to exclude headers for any requests with any standard header from logging. Use `exclude` to exclude headers for requests with specific standard headers. Use `only` to include headers for requests with specific standard headers.
                        enum:
                        - all
                        - none
                        - exclude
                        - only
                        type: string
                      values:
                        description: List of headers to include or exclude depending on the `type` setting.
                        items:
                          type: string
                        type: array
                    required:
                    - type
                    type: object
                    x-akamai:
                      file-path: schemas/logging-header-setting.yaml
                required:
                - allowSampling
                - cookies
                - customHeaders
                - standardHeaders
                type: object
                x-akamai:
                  file-path: schemas/header-logging-get-200.yaml
          description: Successfully retrieved the HTTP Header Logging settings.
