      parameters:
      - description: If specified, maximum number of items to return per request, up to the system [limits](https://techdocs.akamai.com/edgekv/docs/limits).
        example: '{{maxItems}}'
        in: query
        name: maxItems
        schema:
          example: 10
          type: integer
        x-akamai:
          file-path: parameters/maxItems-query.yaml
      - description: Accesses EdgeKV data in the specified sandbox environment. To list existing sandbox identifiers, run the Sandbox API's [List sandboxes](https://techdocs.akamai.com/sandbox/reference/get-sandboxes) operation.
        example: '{{sandboxId}}'
        in: query
        name: sandboxId
        schema:
          example: 4d91057d-xxxx-xxxx-xxxx-3a4472699df4
          type: string
        x-akamai:
          file-path: parameters/sandboxId-query.yaml
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
