openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Items API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- name: Items
paths:
  /networks/{network}/namespaces/{namespaceId}/groups/{groupId}:
    parameters:
    - description: Unique identifier for each group within a namespace.
      example: '{{groupId}}'
      in: path
      name: groupId
      required: true
      schema:
        example: countries
        type: string
      x-akamai:
        file-path: parameters/groupId-path.yaml
    - description: Unique identifier for each namespace.
      example: '{{namespaceId}}'
      in: path
      name: namespaceId
      required: true
      schema:
        example: marketing
        type: string
      x-akamai:
        file-path: parameters/namespaceId-path.yaml
    - description: __Enum__ Network environment to execute the API request on.
      example: '{{network}}'
      in: path
      name: network
      required: true
      schema:
        example: staging
        type: string
        enum:
        - production
        - staging
      x-akamai:
        file-path: parameters/network-path.yaml
    get:
      description: View the details of an EdgeKV item (key-value pair) within a group. You need to specify the `namespace` and `group` the item belongs to. This operation returns up to 100 items by default or the number of items specified in the `maxItems`. If there are more than the default or requested items in the specified group, the operation returns a random set of the default or requested items. It can take ten seconds or longer to read an item that has been written to EdgeKV. The API may respond with a 404 error during that period. This is normal behavior for EdgeKV, which is an eventually consistent database.
      operationId: get-group-items
      summary: Akamai List Items Within a Group
      tags:
      - Items
      externalDocs:
        description: See documentation for this operation in Akamai's EdgeKV API
        url: https://techdocs.akamai.com/edgekv/reference/get-group-items
      responses:
        '200':
          description: Returns the list of items in the specified group.
          content:
            application/json:
              example:
              - US
              - DE
              schema:
                description: A list of item identifiers (keys).
                minItems: 1
                type: array
                items:
                  description: An identifier for an item, also called the key.
                  type: string
                x-akamai:
                  file-path: schemas/items-200.yaml
        '400':
          description: Invalid namespace name or group name specified.
          content:
            application/problem+json:
              example:
                detail: Group must only use a string that matches A-Z a-z 0-9 _ or -..
                errorCode: EKV_9000
                instance: /edgekv/error-instances/fcd285bd-aa69-493f-a3b7-4b9d5bbdae8b
                status: 400
                title: Bad Request
                type: /edgekv/error-types/edgekv-bad-request
                additionalDetail:
                  requestId: c5c461e093e7083c
              schema:
                additionalProperties: false
                description: Error messaging.
                type: object
                properties:
                  additionalDetail:
                    additionalProperties: false
                    type: object
                    properties:
                      requestId:
                        description: Request identifier.
                        type: string
                  detail:
                    description: A description of the error.
                    type: string
                  errorCode:
                    description: Internal error code used to assist with troubleshooting by Akamai employees.
                    type: string
                  instance:
                    description: Reference to unique instance of the error.
                    type: string
                  status:
                    description: The HTTP code for the error.
                    type: integer
                  title:
                    description: Text representation of the HTTP error code.
                    type: string
                  type:
                    description: Reference to additional documentation.
                    type: string
                x-akamai:
                  file-path: schemas/error.yaml
        '404':
          description: Namespace or group does not exist.
          content:
            application/problem+json:
              example:
                detail: The requested group is empty or not found.
                errorCode: EKV_9000
                instance: /edgekv/error-instances/fcd285bd-aa69-493f-a3b7-4b9d5bbdae8b
                status: 404
                title: Not Found
                type: /edgekv/error-types/edgekv-not-found
                additionalDetail:
                  requestId: c5c461e093e7083c
              schema:
                additionalProperties: false
                description: Error messaging.
                type: object
                properties:
                  additionalDetail:
                    additionalProperties: false
                    type: object
                    properties:
                      requestId:
                        description: Request identifier.
                        type: string
                  detail:
                    description: A description of the error.
                    type: string
                  errorCode:
                    description: Internal error code used to assist with troubleshooting by Akamai employees.
                    type: string
                  instance:
                    description: Reference to unique instance of the error.
                    type: string
                  status:
                    description: The HTTP code for the error.
                    type: integer
                  title:
                    description: Text representation of the HTTP error code.
                    type: string
                  type:
                    description: Reference to additional documentation.
                    type: string
                x-akamai:
                  file-path: schemas/error.yaml
        '500':
          description: Internal error.
          content:
            application/problem+json:
              example:
                detail: An internal error occurred.
                errorCode: EKV_0000
                instance: /edgekv/error-instances/cdb7767c-817e-4805-9f28-0816eefa0ba8
                status: 500
                title: Internal Server Error
                type: /edgekv/error-types/edgekv-internal-server-error
                additionalDetail:
