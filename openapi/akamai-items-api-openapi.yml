    put:
      description: Create or update an EdgeKV item (name-value). You need to specify the `namespace` and `group` the item belongs to. The target `namespace` must already exist before writing, while the `group` is automatically created for you if it doesn't exist yet.
      operationId: put-item
      summary: Akamai Write an Item
      tags:
      - Items
      externalDocs:
        description: See documentation for this operation in Akamai's EdgeKV API
        url: https://techdocs.akamai.com/edgekv/reference/put-item
      requestBody:
        content:
          application/json:
            example:
              currency: €
              flag: /belgium.png
              name: Belgium
            schema:
              type: object
          text/plain:
            example: English
            schema:
              type: string
      responses:
