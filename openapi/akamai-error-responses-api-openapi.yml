openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Error responses API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- name: Error responses
paths:
  /endpoints/{apiEndPointId}/versions/{versionNumber}/settings/error-responses:
    parameters:
    - description: The unique identifier for the endpoint version.
      example: '{{versionNumber}}'
      in: path
      name: versionNumber
      required: true
      schema:
        example: 1
        type: integer
      x-akamai:
        file-path: parameters/versionNumber-path.yaml
    - description: The unique identifier for the endpoint.
      example: '{{apiEndPointId}}'
      in: path
      name: apiEndPointId
      required: true
      schema:
        example: 1
        type: integer
      x-akamai:
        file-path: parameters/apiEndPointId-path.yaml
    get:
      description: Returns the error response settings configured for an endpoint version.
      operationId: get-error-response-setting
      summary: Get error response settings
      tags:
      - Error responses
      externalDocs:
        description: See documentation for this operation in Akamai's API Endpoint Definition API
        url: https://techdocs.akamai.com/api-definitions/reference/get-error-response-setting
      responses:
        '200':
          description: The response shows current error settings.
          content:
            application/json:
              example:
                API_KEY_FORBIDDEN:
                  body: '{"title":"The API key you provided does not have access to the requested resource." }'
                  overrideDefaults: false
                  statusCode: 403
                  headers:
                  - name: Content-Type
                    value: application/problem+json
                API_KEY_INVALID:
                  body: '{"title":"The API key you provided does not exist." }'
                  overrideDefaults: false
                  statusCode: 401
                  headers:
                  - name: Content-Type
                    value: application/problem+json
                JWT_CLAIM_VALUE_INVALID:
                  body: '{"title":"The JWT claim value did not pass the JWT validation." }'
                  overrideDefaults: false
                  statusCode: 401
                  headers:
                  - name: Content-Type
                    value: application/problem+json
                JWT_SIGNATURE_INVALID:
                  body: '{"title":"The JSON web signature in JWT did not pass the JWT validation." }'
                  overrideDefaults: false
                  statusCode: 401
                  headers:
                  - name: Content-Type
                    value: application/problem+json
                QUOTA_EXCEEDED:
                  body: '{"title":"The quota limit for the API key you provided has been exceeded during the current time period." }'
                  overrideDefaults: false
                  statusCode: 429
                  headers:
                  - name: Content-Type
                    value: application/problem+json
              schema:
                additionalProperties: false
                description: Contains information about error response settings configured for an endpoint. If an inbound client request fails, API Gateway returns a default error response with a JSON-formatted description and a status code. You can customize the descriptions, status codes, and headers of selected error responses to help API consumers identify the cause of an error and troubleshoot effectively. You can configure error response settings if the API Gateway product is in your contract.
                type: object
                properties:
                  API_KEY_FORBIDDEN:
                    additionalProperties: false
                    description: 'Contains information about a customizable error response. You can customize the following error types: `API_KEY_INVALID`, `API_KEY_FORBIDDEN`, `QUOTA_EXCEEDED`, `JWT_SIGNATURE_INVALID`, `JWT_CLAIM_VALUE_INVALID`.'
                    type: object
                    required:
                    - statusCode
                    properties:
                      body:
                        description: The response body to return in case of the error. The value should have the proper formatting to reflect the content type. For example, in case of a JSON body format, enclose the text in curly brackets (`{}`).
                        type: string
                      headers:
                        description: The list of HTTP headers to return in case of the error. By default, API Gateway returns the `Content-Type` header with a value of `application/problem+json` which reflects the default response body. If the `body` member indicates a different content type, set the `Content-Type` header to the appropriate value. For example, in case of an XML body, the value could be `application/problem+xml`.
