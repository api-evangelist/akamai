openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Configuration version export API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: 'Get comprehensive details about a security configuration

    version.'
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: 'Get comprehensive details about a security configuration

    version.'
  name: Configuration version export
paths:
  /configs/{configId}/versions/{versionNumber}/export:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    x-akamai:
      file-path: paths/config-version-async-export.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/export
    post:
      description: __All products__ Start an asynchronous export of a security configuration version. The response contains an `exportId` you can use to monitor progress and get the export data once it's ready.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/post-export-config-version-async-task
      operationId: post-export-config-version-async-task
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '202':
          content:
            application/json:
              example:
                createdBy: jkowalski@example.com
                createdDate: '2025-08-06T10:44:05.016608Z'
                exportId: '161'
                exportStatus: PENDING
                retryAfter: 60
                statusLink: /appsec/v1/configs/24193/versions/39/export/161/status
              schema:
                additionalProperties: false
                description: Describes the response for an asynchronous export task.
                properties:
                  createdBy:
                    description: The user who launched the export task.
                    minLength: 1
                    type: string
                  createdDate:
                    description: __Read-only__ ISO 8601 timestamp when the export request begins.
                    format: date-time
                    readOnly: true
                    type: string
                  expiresDate:
                    description: ISO 8601 timestamp when the export result is deleted.
                    format: date-time
                    type: string
                  exportId:
                    description: Uniquely identifies each export task.
                    type: string
                  exportStatus:
                    description: "__Read-only__ The status of the export, which can take several minutes to complete. \n* `PENDING` indicates the task is accepted and in progress. \n* `COMPLETED` means it finished successfully and the result can be retrieved. \n* `FAILED` means the task could not be processed."
                    enum:
                    - PENDING
                    - COMPLETED
                    - FAILED
                    minLength: 1
                    readOnly: true
                    type: string
                  message:
                    description: A message providing additional information about the export task.
                    type: string
                  resultLink:
                    description: The URL for the operation to request the task result.
                    format: uri
                    type: string
                  retryAfter:
                    description: The estimated number of seconds until the task completes.
                    type: integer
                  statusLink:
                    description: The URL for the operation to request the task status.
                    format: uri
                    type: string
                required:
                - exportId
                - exportStatus
                - createdDate
                - createdBy
                type: object
                x-akamai:
                  file-path: schemas/export-async-status.yaml
          description: Successfully started exporting asynchronously.
          headers:
            Retry-After:
              description: The estimated number of seconds until the task completes. This header only appears for tasks still in progress.
              required: false
              schema:
                example: 60
                type: integer
              x-akamai:
                file-path: headers/retry-after.yaml
        '403':
          content:
            application/problem+json:
              example:
                detail: You do not have the necessary access to perform this operation or the requested resource cannot be modified
                instance: https://problems.luna.akamaiapis.net/appsec/error-instances/d54686b5-21cb-4ab7-a8d6-a92282cf1749
                status: 403
                title: Forbidden
                type: https://problems.luna.akamaiapis.net/appsec-resource/error-types/ACCESS-DENIED
              schema:
                additionalProperties: true
                description: Details the errors you can receive.
                properties:
                  detail:
                    description: The detailed error message.
                    type: string
                  fieldErrors:
                    description: Pointers to fields for which invalid input was provided, whose values are messages detailing the reason this input was invalid for this field.
                    type: object
                  instance:
                    description: The non-referenceable URI that indicates the error instance.
                    example: https://problems.luna.akamaiapis.net/api-definitions/error-instances/d54686b5-21cb-4ab7-a8d6-a92282cf1749
                    type: string
                  status:
