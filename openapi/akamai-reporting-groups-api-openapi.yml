            application/json:
              example:
                groups:
                - reportingGroupId: 101010
                  reportingGroupName: Region XYZ
                  accessGroup:
                    contractId: K-0N7RAK7
                    groupId: 15225
                  contracts:
                  - contractId: K-0N7RAK71
                    cpcodes:
