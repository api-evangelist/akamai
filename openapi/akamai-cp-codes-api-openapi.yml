openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens CP codes API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- name: CP codes
paths:
  /cpcodes:
    x-akamai:
      file-path: paths/cpcodes.yaml
      path-for-file: /cpcodes
    x-akamai-descriptor-tools:
      displayName: cpCodes
      group: CpCodes
    get:
      description: Lists detailed information about CP codes available within your account and contract.
      operationId: get-cpcodes
      summary: List CP codes
      tags:
      - CP codes
      externalDocs:
        description: See documentation for this operation in Akamai's CP Codes and Reporting Groups API
        url: https://techdocs.akamai.com/cp-codes/reference/get-cpcodes
      responses:
        '200':
          description: Lists details of CP codes available for a specified account and contract.
          content:
            application/json:
              example:
                cpcodes:
                - accountId: A-CCT9012
                  cpcodeId: 1234567
                  cpcodeName: Digital Company CP Code
                  defaultTimezone: GMT 0 (Greenwich Mean Time)
                  purgeable: true
                  type: Regular
                  accessGroup:
                    contractId: C-0N7RAC7
                    groupId: 15225
                  overrideTimezone:
                    timezoneId: '0'
                    timezoneValue: GMT 0 (Greenwich Mean Time)
                  contracts:
                  - contractId: K-0N7RAK71
                    status: ongoing
                  products:
                  - productId: AdvSite::Reporter
                    productName: Monitor site advance
                - accountId: A-CCT9012
                  cpcodeId: 1234567
                  cpcodeName: Internet Company CP Code
                  defaultTimezone: GMT 0 (Greenwich Mean Time)
                  purgeable: true
                  type: Regular
                  accessGroup:
                    contractId: K-0N7RAK71
                    groupId: 15225
                  overrideTimezone:
                    timezoneId: '0'
                    timezoneValue: GMT 0 (Greenwich Mean Time)
                  contracts:
                  - contractId: C-0N7RAC71
                    status: ongoing
                  products:
                  - productId: Dev::Cloud
                    productName: Cloud development CD
              schema:
                additionalProperties: false
                description: Provides details about the CP codes available for your contract.
                type: object
                required:
                - cpcodes
                properties:
                  cpcodes:
                    description: A collection of CP codes available for your contract.
                    minItems: 0
                    type: array
                    items:
                      additionalProperties: false
                      description: Provides detailed information about a CP code.
                      type: object
                      required:
                      - cpcodeId
                      - cpcodeName
                      - contracts
                      - products
                      properties:
                        accessGroup:
                          additionalProperties: false
                          description: A group that controls access to specific CP codes.
                          type: object
                          required:
                          - contractId
                          - groupId
                          properties:
                            contractId:
                              description: 'Identifies the contract assigned to the access control group. Get and store this ID from your account using the [Contracts API](https://techdocs.akamai.com/contract-api/reference/get-contract-ids).


                                **Note**: See [ID prefixes](https://techdocs.akamai.com/cp-codes/reference/id-prefixes) for guidance on comparing this value with data from PAPI.'
                              minLength: 1
                              type: string
                            groupId:
                              description: 'Identifies the access control group. Reporting groups may belong to many groups. If that happens, this member''s value is `null`.


                                **Note**: See [ID prefixes](https://techdocs.akamai.com/cp-codes/reference/id-prefixes) for guidance on comparing this value with data from PAPI.'
                              minimum: 0
                              nullable: true
                              type: integer
                          x-akamai:
                            file-path: schemas/access-group.yaml
                        accountId:
                          description: 'Identifies an account assigned to the CP code.


                            **Note**: See [ID prefixes](https://techdocs.akamai.com/cp-codes/reference/id-prefixes) for guidance on comparing this value with data from PAPI.'
                          minLength: 1
                          type: string
                        contracts:
                          description: Provides detailed information about the contracts assigned to the CP code.
                          minItems: 0
                          readOnly: true
                          type: array
                          items:
                            additionalProperties: false
                            description: Specifies details of a single contract.
                            type: object
                            required:
                            - contractId
                            properties:
                              contractId:
                                description: 'Identifies the contract.


                                  **Note**: See [ID prefixes](https://techdocs.akamai.com/cp-codes/reference/id-prefixes) for guidance on comparing this value with data from PAPI.'
                                minLength: 1
                                readOnly: true
                                type: string
                              status:
                                description: The status of a contract.
                                minLength: 1
                                readOnly: true
                                type: string
                          x-akamai:
                            file-path: schemas/contracts-status-array.yaml
                        cpcodeId:
                          description: 'Identifies the CP code.


                            **Note**: See [ID prefixes](https://techdocs.akamai.com/cp-codes/reference/id-prefixes) for guidance on comparing this value with data from PAPI.'
                          minimum: 1
                          type: integer
                        cpcodeName:
                          description: The descriptive label for the CP code.
                          minLength: 1
                          type: string
                        defaultTimezone:
                          description: The default GMT time zone assigned to the CP code.
                          minLength: 1
                          type: string
                        overrideTimezone:
                          additionalProperties: false
                          description: The GMT time zone that overrides the default time zone assigned to the CP code. Only a few legacy reports override the default time zone for the time axis. Most reports, and all new ones, use the user's own time zone for the time axis.
                          type: object
                          required:
                          - timezoneId
                          properties:
                            timezoneId:
                              description: Identifies the GMT time zone.
                              minLength: 1
                              type: string
                            timezoneValue:
                              description: The offset value for the GMT time zone.
                              minLength: 1
                              type: string
                          x-akamai:
                            file-path: schemas/override-timezone.yaml
                        products:
                          description: A collection of products and services assigned to the CP code.
                          minItems: 0
                          type: array
                          items:
                            additionalProperties: false
                            description: Specifies details of a single product.
                            type: object
                            required:
                            - productId
                            properties:
                              productId:
                                description: 'Identifies a product or service.


                                  **Note**: See [ID prefixes](https://techdocs.akamai.com/cp-codes/reference/id-prefixes) for guidance on comparing this value with data from PAPI.'
                                minLength: 1
                                type: string
                              productName:
                                description: The descriptive label for a product or service.
                                minLength: 1
                                type: string
                          x-akamai:
                            file-path: schemas/products-array.yaml
                        purgeable:
                          description: Whether you can purge the content cached by the CP code.
                          type: boolean
                        type:
                          description: Whether the CP code supports serving traffic from `China`, or `Regular` traffic elsewhere.
                          type: string
                          enum:
                          - Regular
                          - China
                      x-akamai:
                        file-path: schemas/cpcode-200.yaml
                x-akamai:
                  file-path: schemas/cpcodes-200.yaml
        '400':
          description: '[Bad request](https://techdocs.akamai.com/cp-codes/reference/400).'
