      parameters:
      - description: Identifies the contract to filter data by. Include this optional parameter to narrow down the results to a specific contract only.
        example: '{{contractId}}'
        in: query
        name: contractId
        schema:
          example: 1Q004
          type: string
        x-akamai:
          file-path: parameters/contractId-query.yaml
      - description: Identifies the access group to filter data by. Include this optional parameter to narrow down the results to a specific access group only.
        example: '{{groupId}}'
        in: query
        name: groupId
        schema:
          example: '9760'
          type: string
        x-akamai:
          file-path: parameters/groupId-query.yaml
      - description: Identifies the product or service to filter data by. Include this optional parameter to narrow down the results to a specific product only.
        example: '{{productId}}'
        in: query
        name: productId
        schema:
          example: prd_Web_App_Accel
          type: string
        x-akamai:
          file-path: parameters/productId-query.yaml
      - description: The name of the CP code to filter data by. Include this optional parameter to narrow down the results to a specific CP code name only.
        example: '{{cpcodeName}}'
        in: query
        name: cpcodeName
        schema:
          example: CPC XYZ
          type: string
        x-akamai:
          file-path: parameters/cpcodeName-query.yaml
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        example: '{{accountSwitchKey}}'
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
    post:
      description: 'To create a new CP code, you need to associate it with a product. You can assign any CP code within a property''s rule tree as detailed in the [Rule Trees](https://techdocs.akamai.com/property-mgr/reference/rule-trees) section. You should match the same `productId` that''s assigned to properties that invoke the CP code to the one assigned to the CP code, otherwise you may get a warning.


        To view or update certain CP code data, such as name, time zone, and purgeability, use the [CP Codes and Reporting Groups API](https://techdocs.akamai.com/cp-codes/reference/api).'
      operationId: post-cpcodes
      summary: Akamai Create a New CP Code
      tags:
      - CP codes
      externalDocs:
        description: See documentation for this operation in Akamai's Property Manager API
        url: https://techdocs.akamai.com/property-mgr/reference/post-cpcodes
      requestBody:
        required: true
        content:
          application/json:
            example:
              cpcodeName: SME WAA
              productId: prd_Web_App_Accel
            schema:
              $schema: http://json-schema.org/draft-04-schema#
              description: Specifies billing and reporting codes. To make a POST request that creates a new CP code, specify an object with `productId` and `cpcodeName` members. Relevant response objects appear within the outer envelope's `cpcodes.items` array.
              id: resource:/descriptors/papi/v1/schemas/CreateNewCPCodeRequestV0.json#
              javaType: com.akamai.luna.papi.model.CPCodeCreateRequest
              type: object
              required:
              - productId
              - cpcodeName
              properties:
                cpcodeName:
                  description: 'A descriptive label for the CP code. The name can''t include commas, underscores, quotes, or any of these special characters: `^ # %`.'
                  example: '{{cpcodeName}}'
                  type: string
                productId:
                  description: On POST, the product to assign to this CP code. See [ID prefixes](https://techdocs.akamai.com/property-mgr/reference/id-prefixes) for details on how to omit the ID's `prd_` prefix.
                  example: '{{productId}}'
                  type: string
              x-akamai:
                file-path: schemas/cpcode-create-request.yaml
      responses:
        '201':
          description: The response provides a URL link to the newly created CP code.
          content:
            application/json:
              example:
                cpcodeLink: /papi/v0/cpcodes/cpc_33190?contractId=ctr_C-0N7RAC7&groupId=grp_15166
              schema:
                $schema: http://json-schema.org/draft-04-schema#
                additionalProperties: false
                description: Provides a hypermedia link to a newly created resource. The response's single member name indicates the type of resource.
                id: resource:/descriptors/papi/v1/schemas/PostCpCodeResponse.json#
                type: object
                required:
                - cpcodeLink
                properties:
                  cpcodeLink:
                    description: Links the newly created CP code.
                    type: string
                x-akamai:
                  file-path: schemas/cpcode-post-response.yaml
          headers:
            Location:
              description: Provides a URL path you can GET the newly created resource from.
              schema:
                type: string
              x-akamai:
                file-path: headers/Location.yaml
