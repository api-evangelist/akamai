                            additionalProperties: false
                            properties:
                              description:
                                description: Describes why the proposed tuning exception is recommended.
                                type: string
                              evidences:
                                description: Provides additional information about the recommendation.
                                type: string
                              exceptions:
                                description: Describes the exception fields that allow you to conditionally exclude requests from inspection.
