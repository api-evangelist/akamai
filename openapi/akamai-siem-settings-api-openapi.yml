openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens SIEM settings API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: Manage SIEM settings for your security configurations.
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: Manage SIEM settings for your security configurations.
  name: SIEM settings
paths:
  /configs/{configId}/versions/{versionNumber}/siem:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    x-akamai:
      file-path: paths/config-siem.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/siem
    get:
      description: __All products__ Return SIEM settings for a specific configuration.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-siem
      operationId: get-siem
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                enableForAllPolicies: false
                enableSiem: true
                enabledBotmanSiemEvents: false
                exceptions:
                - actionTypes:
                  - '*'
                  protection: botmanagement
                - actionTypes:
                  - alert
                  protection: ipgeo
                - actionTypes:
                  - alert
                  protection: rate
                firewallPolicyIds:
                - qik2_38799
                - '4444_44572'
                - teet_39295
                - ds22_48583
                includeJA4FingerprintToSiem: true
                siemDefinitionId: 1
              schema:
                additionalProperties: false
                description: Contains Security Information Event Management (SIEM) integration settings.
                properties:
                  enableForAllPolicies:
                    description: Whether you enabled SIEM for all the security policies in the configuration version.
                    type: boolean
                  enableSiem:
                    description: Whether you enabled SIEM in a security configuration version.
                    type: boolean
                  enabledBotmanSiemEvents:
                    deprecated: true
                    description: __Deprecated__ Whether you enabled SIEM for the Bot Manager events. Use `exceptions` parameter instead to set botman siem events exception.
                    type: boolean
                    x-akamai:
                      status: DEPRECATED
                  exceptions:
                    description: Describes all attack type exceptions that will be ignored in SIEM events.
                    items:
                      additionalProperties: false
                      properties:
                        actionTypes:
                          description: Describes [actions](https://techdocs.akamai.com/application-security/reference/siem-action-and-attack-type-exceptions) to be excluded for a particular attack type. A `*` value means all actions.
                          items:
                            enum:
                            - '*'
                            - alert
                            - deny
                            - all_custom
                            - abort
                            - allow
                            - delay
                            - ignore
                            - monitor
                            - slow
                            - tarpit
                            type: string
                          type: array
                        protection:
                          description: '[Attack types](https://techdocs.akamai.com/application-security/reference/siem-action-and-attack-type-exceptions) to be added as an exception.'
                          enum:
                          - ipgeo
                          - rate
                          - urlProtection
                          - slowpost
                          - customrules
                          - waf
                          - apirequestconstraints
                          - clientrep
                          - malwareprotection
                          - botmanagement
                          - aprProtection
                          - aifirewallprotection
                          type: string
                      type: object
                    type: array
                  firewallPolicyIds:
                    description: The list of security policy identifiers for which to enable the SIEM integration.
                    items:
                      type: string
                    type: array
                  includeJA4FingerprintToSiem:
                    description: Whether you enabled JA4 header forwarding for SIEM.
                    type: boolean
                  siemDefinitionId:
                    description: Uniquely identifies the SIEM settings.
                    type: integer
                required:
                - enableSiem
                type: object
                x-akamai:
                  file-path: schemas/siem-settings.yaml
          description: Successfully retrieved SIEM settings.
        '400':
