    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    - description: A unique identifier for a security policy.
      in: path
      name: policyId
      required: true
      schema:
        example: boBF_19288
        type: string
      x-akamai:
        file-path: parameters/policy-id-path.yaml
    x-akamai:
      file-path: paths/policy-behavioral-ddos-profiles.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/behavioral-ddos
    get:
      description: Returns a list of all Behavioral DDoS profiles currently in use, along with the actions each profile takes when conditions are met. _Products:_ All.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-behavioral-ddos-actions
      operationId: get-behavioral-ddos-actions
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                behavioralDdosActions:
                - action: alert
                  profileId: 100
                - action: deny
                  profileId: 103
              schema:
                additionalProperties: false
                description: Behavioral DDoS profile actions.
                properties:
                  behavioralDdosActions:
                    description: Behavioral DDoS actions in the configuration version.
                    items:
                      additionalProperties: false
                      description: A Behavioral DDoS profile action.
                      properties:
                        action:
                          description: The action to assign to this Behavioral DDoS profile. Choose `alert`, `deny`, `none`, or `deny_custom_{custom_deny_id}`. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions. If the action is `none`, the Behavioral DDoS profile is inactive in the policy.
                          oneOf:
                          - enum:
                            - alert
                            - deny
                            - none
                            title: Predefined actions
                            type: string
                          - minLength: 1
                            pattern: ^deny_custom_[0-9]+$
                            title: Custom actions
                            type: string
                        profileId:
                          description: __Read-only__ Uniquely identifies the Behavioral DDoS profile.
                          format: int64
                          readOnly: true
                          type: integer
                      required:
                      - action
                      type: object
                      x-akamai:
                        file-path: schemas/behavioral-ddos-action.yaml
                    minItems: 0
                    type: array
                required:
