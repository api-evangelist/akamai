                    required:
                    - configId
                    - version
                    type: object
                  description:
                    description: Describes the security configuration.
                    type: string
                  groupId:
                    description: Group ID.
                    type: integer
                  hostnames:
                    description: List of hostnames to be added to the configuration.
                    items:
                      type: string
                    type: array
                  name:
                    description: The name you assigned to the security configuration.
                    type: string
                  version:
                    description: The configuration version of the security configuration.
