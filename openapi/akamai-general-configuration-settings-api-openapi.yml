openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens General configuration settings API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: Manage security configurations and their versions.
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: Manage security configurations and their versions.
  name: General configuration settings
paths:
  /configs:
    x-akamai:
      file-path: paths/configs.yaml
      path-info: /configs
    post:
      description: __All products__ Create a new WAP or KSD security configuration. KSD security configurations start out empty, and WAP configurations are created with preset values. The contract you pass in the request body determines which product you use.  You can edit the default settings included in the WAP configuration, but you'll need to run additional operations in this API to select specific protections for KSD. Your KSD configuration needs match targets and protection settings before you activate.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/post-config
      operationId: post-config
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      requestBody:
        content:
          application/json:
            example:
              contractId: C-0N7RAC7
              description: description1
              groupId: 32145
              hostnames:
              - new.example.com
              - www.example.com
              name: newapitest
            schema:
              additionalProperties: false
              description: Specifies the details of a security config.
              properties:
                configId:
                  description: Uniquely identifies the security configuration.
                  type: integer
                contractId:
                  description: Contract ID.
                  type: string
                createFrom:
                  additionalProperties: false
                  description: Contains details about a source configuration and version for cloning a new security configuration.
                  properties:
                    configId:
                      description: Uniquely identifies the security configuration.
                      type: integer
                    version:
                      description: The configuration version to clone from.
                      type: integer
                  required:
                  - configId
                  - version
                  type: object
                description:
                  description: Describes the security configuration.
                  type: string
                groupId:
                  description: Group ID.
                  type: integer
                hostnames:
                  description: List of hostnames to be added to the configuration.
                  items:
                    type: string
                  type: array
                name:
                  description: The name you assigned to the security configuration.
                  type: string
                version:
                  description: The configuration version of the security configuration.
                  type: integer
              required:
              - name
              - description
              - hostnames
              type: object
              x-akamai:
                file-path: schemas/config-post.yaml
        required: true
      responses:
        '201':
          content:
            application/json:
              example:
                configId: 71710
                description: description1
                hostnames:
                - www.abc.com
                - www.xyz.com
                name: newapitest
                version: 1
              schema:
                additionalProperties: false
                description: Specifies the details of a security config.
                properties:
                  configId:
                    description: Uniquely identifies the security configuration.
                    type: integer
                  contractId:
                    description: Contract ID.
                    type: string
                  createFrom:
                    additionalProperties: false
                    description: Contains details about a source configuration and version for cloning a new security configuration.
                    properties:
                      configId:
                        description: Uniquely identifies the security configuration.
                        type: integer
                      version:
                        description: The configuration version to clone from.
