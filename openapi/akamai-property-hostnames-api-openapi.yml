                        description: For paginated responses, this links to the next set of response items.
                        type: string
                      previousLink:
                        description: For paginated responses, this links to the next set of response items.
                        type: string
                      totalItems:
                        description: The total count of items returned for the requested criteria.
                        minimum: 0
                        type: integer
