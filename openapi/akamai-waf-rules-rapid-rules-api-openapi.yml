openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens WAF rules: Rapid rules API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: 'Quickly manage and mitigate risks resulting from the most recent high-profile, critical vulnerabilities.

    __Note__. Rapid rules are rules you can apply while we are still testing and perfecting them. Once we finish that process, a rapid rule becomes a WAF rule.'
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: 'Quickly manage and mitigate risks resulting from the most recent high-profile, critical vulnerabilities.

    __Note__. Rapid rules are rules you can apply while we are still testing and perfecting them. Once we finish that process, a rapid rule becomes a WAF rule.'
  name: 'WAF rules: Rapid rules'
paths:
  /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/rapid-rules:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    - description: A unique identifier for a security policy.
      in: path
      name: policyId
      required: true
      schema:
        example: boBF_19288
        type: string
      x-akamai:
        file-path: parameters/policy-id-path.yaml
    x-akamai:
      file-path: paths/rapid-rules.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/rapid-rules
    get:
      description: __All products__ Returns rapid rules. [Rapid rules](https://techdocs.akamai.com/app-api-protector/docs/rapid-rules) are WAF rules we are actively testing and refining. You can start using them while we revise them. Once we complete fine-tuning a rule, it becomes a WAF rule you can access through [List rules](https://techdocs.akamai.com/application-security/docs/get-policy-rules).
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-policy-rapid-rules
      operationId: get-policy-rapid-rules
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                policyRules:
                - action: deny
                  conditionException: {}
                  id: 950002
                  lock: true
                  riskScoreGroups: []
                  title: Rapid rule title
                  version: 1
                - action: alert
                  conditionException: {}
                  id: 950006
                  lock: false
                  riskScoreGroups:
                  - LFI
                  title: Local File Inclusion (LFI) Attack on Linux files
                  version: 2
                - action: alert
                  conditionException:
                    exception:
                      specificHeaderCookieParamXmlOrJsonNames:
                      - names:
                        - test
                        selector: REQUEST_COOKIES_NAMES
                        wildcard: true
                  id: 950007
                  lock: false
                  riskScoreGroups:
                  - XSS
                  title: Cross-site Scripting (XSS) Attack
                  version: 2
