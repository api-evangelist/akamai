                          - enum:
                            - alert
                            - deny
                            - none
                            - akamai_managed
                            title: Predefined action
                            type: string
                          - pattern: ^(challenge|deny_custom|serve_alt|cond_action_)_[0-9]+$
                            title: Configurable action
                            type: string
                          type: object
                          x-akamai:
                            file-path: schemas/rapid-rule-action.yaml
