        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                enablePiiLearning: true
              schema:
                additionalProperties: false
                description: Summarizes availability of PII learning.
                properties:
                  enablePiiLearning:
                    description: Enables PII learning.
                    type: boolean
                required:
                - enablePiiLearning
                type: object
                x-akamai:
                  file-path: schemas/pii-learning.yaml
          description: Successfully retrieved the PII learning settings.
