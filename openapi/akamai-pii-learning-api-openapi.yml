paths:
  /configs/{configId}/versions/{versionNumber}/advanced-settings/pii-learning:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    x-akamai:
      file-path: paths/config-pii-learning.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/advanced-settings/pii-learning
    get:
      description: __Kona Site Defender__, __App & API Protector with the Advanced Security module__ Shows whether PII learning is enabled. This operation applies at the security configuration level.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-advanced-settings-pii-learning
