    put:
      description: '__Kona Site Defender__, __App & API Protector with the Advanced Security module__ Turn on PII learning for your API definition. To enable PII learning, submit your request with a payload of `{"enablePiiLearning": true}`. To disable PII learning, submit your request with a payload of `{"enablePiiLearning": false}`. This operation applies at the security configuration level. Run [Modify PII settings for an endpoint version](https://techdocs.akamai.com/api-definitions/reference/post-endpoint-version-pii-settings) to manage your API definitions in regards to PII.'
