  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: 'Manage settings for Personally Identifiable Information (PII)

    learning. With this feature, the network discovers PII on your

    behalf.'
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: 'Manage settings for Personally Identifiable Information (PII)

    learning. With this feature, the network discovers PII on your

