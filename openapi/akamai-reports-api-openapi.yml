openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Reports API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- name: Reports
paths:
  /reports:
    get:
      description: View a list of available reports. The data in these reports is also available in the [EdgeWorkers Management application](https://techdocs.akamai.com/edgeworkers/docs/manage-report-data).
      operationId: get-reports
      summary: Akamai List Reports
      tags:
      - Reports
      externalDocs:
        description: See documentation for this operation in Akamai's EdgeWorkers API
        url: https://techdocs.akamai.com/edgeworkers/reference/get-reports
      responses:
        '200':
          description: Describes a list of EdgeWorker reports.
          content:
            application/json:
              example:
                reports:
                - description: This report contains an overview of other reports.
                  name: Overall summary
                  reportId: 1
                - description: This report lists execution and initialization times, grouped by EdgeWorker ID and event handler.
                  name: Initialization and execution times by EdgeWorker ID and event handler
                  reportId: 2
                  unavailable: true
                - description: This report lists execution statuses, grouped by EdgeWorker ID and event handler.
                  name: Execution statuses by EdgeWorker ID and event handler
                  reportId: 3
                - description: This report lists memory usage, grouped by EdgeWorker ID and event handler.
                  name: Memory usage by EdgeWorker ID and event handler
                  reportId: 4
                  unavailable: true
                - description: This report lists execution and initialization times with percentiles, grouped by EdgeWorker ID and event handler.
                  name: Initialization and execution times with percentiles by EdgeWorker ID and event handler
                  reportId: 5
                - description: This report lists memory usage with percentiles, grouped by EdgeWorker ID and event handler.
                  name: Memory usage with percentiles by EdgeWorker ID and event handler
                  reportId: 6
                - description: This report contains the total number of sub-requests.
                  name: Sub-requests
                  reportId: 7
              schema:
                additionalProperties: false
                type: object
                required:
                - reports
                properties:
                  reports:
                    description: List of EdgeWorker reports.
                    minItems: 1
                    type: array
                    items:
                      additionalProperties: false
                      type: object
                      properties:
                        data:
                          description: Object containing data points of the EdgeWorker report.
                          oneOf:
                          - title: Single report
                            oneOf:
                            - additionalProperties: false
                              description: Specifies summary data for each EdgeWorker's usage.
                              title: Report 1
                              type: object
                              required:
                              - invocations
                              - successes
                              - errors
                              - execDuration
                              - initDuration
                              - memory
                              properties:
                                errors:
                                  additionalProperties: false
                                  description: Failed event handler executions.
                                  type: object
                                  required:
                                  - total
                                  properties:
                                    total:
                                      description: Total number of failed executions.
                                      type: integer
                                execDuration:
                                  additionalProperties: false
                                  description: Execution duration.
                                  type: object
                                  required:
                                  - avg
                                  - min
                                  - max
                                  - twentyFivePercentile
                                  - fiftyPercentile
                                  - seventyFivePercentile
                                  - ninetyFivePercentile
                                  - ninetyNinePercentile
                                  properties:
                                    avg:
                                      description: Average clock time used to execute event handlers, in milliseconds.
                                      type: number
                                    fiftyPercentile:
                                      description: 50% of the invocations took less execution time than this field's value, in milliseconds.
                                      type: number
                                    max:
                                      description: Maximum clock time used to execute event handlers, in milliseconds.
                                      type: number
                                    min:
                                      description: Minimum clock time used to execute event handlers, in milliseconds.
                                      type: number
                                    ninetyFivePercentile:
                                      description: 95% of the invocations took less execution time than this field's value, in milliseconds.
                                      type: number
                                    ninetyNinePercentile:
                                      description: 99% of the invocations took less execution time than this field's value, in milliseconds.
                                      type: number
                                    seventyFivePercentile:
                                      description: 75% of the invocations took less execution time than this field's value, in milliseconds.
                                      type: number
                                    twentyFivePercentile:
                                      description: 25% of the invocations took less execution time than this field's value, in milliseconds.
                                      type: number
                                  x-akamai:
                                    file-path: schemas/report-exec-duration.yaml
                                initDuration:
                                  additionalProperties: false
                                  description: Initialization duration.
                                  type: object
                                  required:
                                  - avg
                                  - min
                                  - max
                                  - twentyFivePercentile
                                  - fiftyPercentile
                                  - seventyFivePercentile
                                  - ninetyFivePercentile
                                  - ninetyNinePercentile
                                  properties:
                                    avg:
