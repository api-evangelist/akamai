openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Hostnames API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: Manage the hostnames in your configuration settings.
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: Manage the hostnames in your configuration settings.
  name: Hostnames
paths:
  /configs/{configId}/versions/{versionNumber}/hostname-coverage/overlapping:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    x-akamai:
      file-path: paths/config-hostname-coverage-overlapping.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/hostname-coverage/overlapping
    get:
      description: __Kona Site Defender__, __App & API Protector with the Advanced Security module__ List the configuration versions that contain a hostname also included in the current configuration version.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-hostname-coverage-overlapping
      operationId: get-hostname-coverage-overlapping
      parameters:
      - description: Get results by hostname.
        in: query
        name: hostname
        schema:
          example: www.example.com
          type: string
        x-akamai:
          file-path: parameters/search-hostname.yaml
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                overLappingList:
                - configId: 57415
                  configName: Main Street Corporation  Mexico
                  configVersion: 37
                  contractId: C-0N7RAC7
                  contractName: Main Street Corporation .-F-I5PAH1
                  versionTags:
                  - STAGING
                - configId: 75498
                  configName: Main Street Corporation  Inc
                  configVersion: 1
                  contractId: K-0N7RAK7
                  contractName: Main Street Corporation .-F-I5PAH1
                  versionTags:
                  - STAGING
                - configId: 42826
                  configName: Main Street Corporation  Local
                  configVersion: 3
                  contractId: K-0N7RAK7
                  contractName: 'Zoro-Main Street Corporation '
                  versionTags:
                  - LAST_CREATED
              schema:
                additionalProperties: false
                description: Describes configurations that use the same hostname, causing overlapping coverage.
                properties:
                  overLappingList:
                    description: The list of configurations that overlap coverage for the hostname.
                    items:
                      additionalProperties: false
                      description: Contains details about an overlapping configuration.
                      properties:
                        configId:
                          description: The configuration ID.
                          type: integer
                        configName:
                          description: The configuration name.
                          type: string
                        configVersion:
                          description: The configuration version.
                          type: integer
                        contractId:
                          description: The contract ID.
                          type: string
                        contractName:
                          description: The contract name.
                          type: string
                        versionTags:
                          description: List of version tags, any combination of `STAGING` and `LAST_CREATED`.
                          items:
                            description: The version tag.
                            enum:
                            - STAGING
                            - LAST_CREATED
                            type: string
                          type: array
                      required:
                      - configId
                      - configName
                      - configVersion
                      type: object
                      x-akamai:
                        file-path: schemas/overlap-config.yaml
                    type: array
                required:
                - overLappingList
                type: object
                x-akamai:
                  file-path: schemas/hostname-coverage-overlapping-get-200.yaml
          description: Successfully retrieved the hostname's overlapping version information.
        '400':
          content:
            application/json:
              example:
                detail: The request could not be understood by the server due to malformed syntax.
                instance: https://problems.luna.akamaiapis.net/appsec/error-instances/d54686b5-21cb-4ab7-a8d6-a92282cf1749
                status: 400
                title: Bad Request
                type: https://problems.luna.akamaiapis.net/appsec/error-types/BAD-REQUEST
              schema:
                additionalProperties: true
                description: Details the errors you can receive.
                properties:
