        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                hostnames:
                - '*.example.net'
                - example.com
                - m.example.com
                mode: append
              schema:
                additionalProperties: false
                description: Contains a list of evaluation hostnames for the specified configuration version.
                properties:
                  hostnames:
                    description: Contains a list of hostnames.
                    items:
                      description: The hostnames on which to match the request.
                      type: string
                    type: array
                  mode:
                    description: The type of update you want to make to the evaluation hostname list. You can `append` additional hostnames, `remove` hostnames from the list, or `replace` the existing list with the hostnames you pass in your request.
                    enum:
                    - append
                    - remove
                    - replace
                    type: string
                required:
                - hostnames
                type: object
                x-akamai:
                  file-path: schemas/eval-hostnames.yaml
          description: Successful response.
