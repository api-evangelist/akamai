        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                evalRuleActions:
                - action: alert
                  id: 699989
                - action: alert
                  id: 699990
                - action: alert
                  id: 699991
                - action: alert
                  id: 699992
                - action: alert
                  id: 699993
                - action: alert
                  id: 699994
              schema:
                additionalProperties: false
                description: The GET Response JSON for eval rule actions.
                properties:
                  evalRuleActions:
                    description: The list of eval rule actions.
                    items:
                      additionalProperties: false
                      description: Rule Action JSON Properties.
                      properties:
                        action:
                          description: The list of rule actions, either `alert`, `deny`, or `none`. Use `deny_custom_{custom_deny_id}` to apply a custom action instead of Akamai's default. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions. If the action is `none`, the rule is inactive in the policy.
