openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Configuration version diff API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- name: Configuration version diff
paths:
  /configs/{configId}/versions/diff:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    x-akamai:
      file-path: paths/diff.yaml
      path-info: /configs/{configId}/versions/diff
    post:
      description: __All products__ This operation shows you differences between configuration versions. The `to` version is relative to the `from` version, and the versions you compare can be non-sequential. This means the `from` value can be more a more recent version than the `to` value. For more information, see [Diff configuration versions](https://techdocs.akamai.com/application-security/reference/diff-configuration-versions).
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/post-config-versions-diff
      operationId: post-config-versions-diff
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      requestBody:
        content:
          application/json:
            example:
              from: 1
              outcomes:
              - MODIFIED
              - UNMODIFIED
              to: 2
            schema:
              additionalProperties: false
              properties:
                from:
                  description: The configuration version number to compare against.
                  type: integer
                outcomes:
                  default:
                  - MODIFIED
                  description: Show either `MODIFIED` or `UNMODIFIED` data, or both. When empty, only `MODIFIED` values are returned.
                  items:
                    enum:
                    - MODIFIED
                    - UNMODIFIED
                    type: string
                  type: array
                to:
                  description: The configuration version number you're comparing to the version in `from`.
                  type: integer
              required:
              - from
              - to
              type: object
              x-akamai:
                file-path: schemas/diff-request.yaml
        required: true
      responses:
        '200':
          content:
            application/json:
              example:
                changesCount:
                  added: 0
                  modified: 4
                  removed: 0
                  unmodified: 0
                configId: 258702
                outcome: MODIFIED
                ratePolicies:
