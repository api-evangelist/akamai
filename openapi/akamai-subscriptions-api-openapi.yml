        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                emails:
                - subscriber1@email.example.com
                - subscriber2@email.example.com
                - subscriber3@email.example.com
              schema:
                additionalProperties: false
                description: List the existing subscribers of a feature for a specific security configuration.
                properties:
                  emails:
                    description: Existing subscriber.
                    items:
