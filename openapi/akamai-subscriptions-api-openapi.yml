        url: https://techdocs.akamai.com/network-lists/reference/post-notifications-subscribe
      requestBody:
        required: true
        content:
          application/json:
            example:
              recipients:
              - it-team@mycompany.com
              - security-team@mycompany.com
              uniqueIds:
              - 32055_REPUTATIONWHITELISTDONO
              - 365_AKAMAITOREXITNODES
            schema:
              additionalProperties: false
              description: Controls who is notified about changes to a set of network lists.
              type: object
              required:
              - recipients
              - uniqueIds
              properties:
                recipients:
                  description: Specifies the full set of email addresses, at least one, that receive notifications about any changes to the network lists specified in `uniqueIds`.
                  minItems: 1
                  type: array
                  uniqueItems: true
                  items:
                    type: string
                uniqueIds:
                  description: Specifies the full set of network list identifiers, at least one, the `recipients` are notified about.
                  minItems: 1
                  type: array
                  uniqueItems: true
                  items:
                    type: string
              x-akamai:
                file-path: schemas/subscribe.yaml
