      name: revisionId
      required: true
      schema:
        example: 3-1
        type: string
      x-akamai:
        file-path: parameters/revisionId-path.yaml
    - description: Unique identifier for an EdgeWorker.
      example: '{{edgeWorkerId}}'
      in: path
      name: edgeWorkerId
      required: true
      schema:
        example: 42
        minimum: 1
        type: integer
      x-akamai:
        file-path: parameters/edgeWorkerId-path.yaml
