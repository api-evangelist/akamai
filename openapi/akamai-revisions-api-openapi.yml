        example: '{{accountSwitchKey}}'
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
  /ids/{edgeWorkerId}/revisions/{revisionId}/bom:
    parameters:
    - description: Unique identifier for an EdgeWorkers revision.
      example: '{{revisionId}}'
      in: path
      name: revisionId
      required: true
      schema:
        example: 3-1
        type: string
      x-akamai:
        file-path: parameters/revisionId-path.yaml
    - description: Unique identifier for an EdgeWorker.
      example: '{{edgeWorkerId}}'
      in: path
