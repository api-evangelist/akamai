                      - UNINITIALIZED
                      - PENDING
        '201':
          description: On initial successful initialization, returns current initialization status and the assigned CP code.
          content:
            application/json:
              example:
                accountStatus: INITIALIZED
                cpcode: '1234567'
                productionStatus: INITIALIZED
                stagingStatus: INITIALIZED
                dataAccessPolicy:
