    put:
      description: __Kona Site Defender__, __App & API Protector with the Advanced Security module__, __Adaptive Security Engine__ The mode you set determines how your rule sets are updated. Use `KRS` mode to update the rule sets manually, or `AAG` to have them update automatically. If you're using Adaptive Security Engine, use `ASE_AUTO` to update the rules automatically, or `ASE_MANUAL` to update them yourself.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/put-policy-mode
      operationId: put-policy-mode
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      requestBody:
        content:
          application/json:
            example:
              mode: KRS
            schema:
              additionalProperties: false
              description: The PUT Request JSON for setting the security policy mode.
              properties:
                mode:
                  description: The security policy rule update mode. Use `KRS` to update rules manually, or `AAG` to update rules automatically. For Adaptive Security Engine (ASE), use `ASE_AUTO` for automatic updates or `ASE_MANUAL` to manually get current rules. When switching from one mode to another, any rule actions you have migrate to the new mode. For example, your rule actions for `ASE_AUTO` become the rule actions for `ASE_MANUAL` when you switch from auto to manual modes, and vice versa. Rule actions for `ASE_AUTO` are currently in beta. Contact your account team to access this option.
                  enum:
                  - KRS
                  - AAG
                  - ASE_AUTO
                  - ASE_MANUAL
                  type: string
              required:
              - mode
              type: object
              x-akamai:
                file-path: schemas/mode-put.yaml
        required: true
      responses:
        '200':
          content:
            application/json:
              example:
                current: KRS 1.0 (Apr 20, 2020)
                mode: KRS
              schema:
                additionalProperties: false
                description: The PUT Response JSON for setting the security policy mode.
                properties:
                  current:
                    description: The rule set version and the latest version date.
                    type: string
                  mode:
                    description: The security policy rule update mode. Use `KRS` to update rules manually, or `AAG` to update rules automatically. For Adaptive Security Engine (ASE), use `ASE_AUTO` for automatic updates or `ASE_MANUAL` to manually get current rules.
                    enum:
                    - KRS
                    - AAG
                    - ASE_AUTO
                    - ASE_MANUAL
                    type: string
                required:
                - mode
                type: object
                x-akamai:
                  file-path: schemas/mode-put-200.yaml
          description: Successfully set the security policy mode.
