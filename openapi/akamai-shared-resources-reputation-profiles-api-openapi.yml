        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      requestBody:
        content:
          application/json:
            example:
              condition:
                atomicConditions:
                - className: AsNumberCondition
                  positiveMatch: true
                  value:
                  - '1'
                - className: RequestCookieCondition
                  name: x-header
                  nameCase: true
                  nameWildcard: true
                  positiveMatch: true
                  valueWildcard: true
                - className: HostCondition
                  host:
                  - '*.com'
                  positiveMatch: true
                  valueWildcard: true
                positiveMatch: true
              context: WEBATCK
              description: Reputation profile description
              name: Web Attack Rep Profile
              sharedIpHandling: NON_SHARED
              threshold: 5
            schema:
              additionalProperties: false
              description: Contains details about a reputation profile.
              properties:
                condition:
                  additionalProperties: false
                  description: Contains information about the criteria that trigger the reputation profile.
                  properties:
