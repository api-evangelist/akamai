  description: 'Manage the penalty box settings for your Web Application

    Firewall implementation.'
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: 'Manage the penalty box settings for your Web Application

    Firewall implementation.'
  name: 'WAF rules: Penalty box'
paths:
  /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/penalty-box:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    - description: A unique identifier for a security policy.
      in: path
      name: policyId
      required: true
      schema:
        example: boBF_19288
        type: string
      x-akamai:
        file-path: parameters/policy-id-path.yaml
    x-akamai:
      file-path: paths/policy-penalty-box.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/penalty-box
    get:
      description: __All products__ Returns the penalty box settings for the security policy you specify.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-policy-penalty-box
      operationId: get-policy-penalty-box
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                action: alert
                penaltyBoxProtection: true
              schema:
                additionalProperties: false
                description: Contains action settings for penalty box protection.
                properties:
                  action:
                    oneOf:
                    - description: 'The action to take when penalty box protection is triggered: `alert` to record the trigger event, `abort` to block the request, or `none` to take no action. Ignored if `penaltyBoxProtection` is set to `false`.'
                      enum:
                      - alert
                      - abort
                      - none
                      title: action
                      type: string
                    - description: 'The custom deny action to take when penalty box protection is triggered: `deny_custom_{custom_deny_id}` to execute a custom deny action. Ignored if `penaltyBoxProtection` is set to `false`.'
                      pattern: deny_custom_{\d+}
                      title: custom action
                      type: string
                  penaltyBoxProtection:
                    description: Specifies whether penalty box protection is enabled for the security policy. When set to `true` the `action` occurs if triggered by a request.
                    type: boolean
                required:
                - penaltyBoxProtection
                - action
                type: object
                x-akamai:
                  file-path: schemas/penalty-box.yaml
          description: Successfully retrieved penalty box protection for the security policy.
        '400':
          content:
            application/json:
              example:
