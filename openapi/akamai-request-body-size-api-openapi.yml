paths:
  /configs/{configId}/versions/{versionNumber}/advanced-settings/request-body:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    x-akamai:
      file-path: paths/config-request-body.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/advanced-settings/request-body
    get:
      description: __All products__ Return request body inspection limit settings for a configuration. Contact your account team if you'd like to run this operation.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-advanced-settings-request-body
      operationId: get-advanced-settings-request-body
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                requestBodyInspectionLimitInKB: '16'
              schema:
                additionalProperties: false
                description: Contains the size limits for a request body.
                properties:
                  requestBodyInspectionLimitInKB:
                    description: Request body size in KB, either `8`, `16`, or `32` as string-formatted integers, or `default` to use Akamai's best practice value.
                    enum:
                    - '8'
                    - '16'
                    - '32'
                    - default
                    type: string
                type: object
                x-akamai:
                  file-path: schemas/request-body.yaml
          description: Successfully retrieved the request body inspection limit settings.
