                x-akamai:
                  file-path: schemas/httpProblemDetails.yaml
      parameters:
      - description: Whether the response should include the `usageCount` data indicating the number of endpoints under a category, `false` by default.
        example: '{{withUsageInfo}}'
        in: query
        name: withUsageInfo
        required: true
        schema:
