    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: 'Manage the attack groups that you''re evaluating for your

    security configurations and policies.'
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: 'Manage the attack groups that you''re evaluating for your

    security configurations and policies.'
  name: 'Security policy: Evaluation attack groups'
paths:
  /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/eval-groups:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    - description: A unique identifier for a security policy.
      in: path
      name: policyId
      required: true
      schema:
        example: boBF_19288
        type: string
      x-akamai:
        file-path: parameters/policy-id-path.yaml
    x-akamai:
      file-path: paths/policy-eval-groups.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/eval-groups
    get:
      description: __All products__ Return a list of evaluation attack groups with their associated actions.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-policy-eval-groups
      operationId: get-policy-eval-groups
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                attackGroupActions:
                - action: deny
                  group: TOOL
                - action: none
                  group: PROTOCOL
                - action: alert
                  group: SQL
                - action: deny
                  group: XSS
                - action: deny
                  group: LFI
                - action: deny
                  group: RFI
                - action: deny
                  group: CMDI
                - action: none
                  group: PLATFORM
              schema:
                additionalProperties: false
                description: Describes the attack group object. Currently, the only field in an attack group object is the `action`.
                properties:
                  attackGroupActions:
                    description: The attack group action, either `alert`, `deny`, or `none`. Use `deny_custom_{custom_deny_id}` to apply a custom action instead of Akamai's default. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions. If the action is `none`, the attack group is inactive in the security policy.
                    items:
                      additionalProperties: false
                      description: Attack Group JSON Properties.
                      properties:
                        action:
                          description: The attack group action, either `alert`, `deny`, or `none`. If the action is `none`, the attack group is inactive in the security policy.
                          enum:
                          - alert
                          - deny
                          - none
                          type: string
                        group:
                          description: The ID for the attack group.
                          type: string
                      required:
                      - action
                      - group
                      type: object
                      x-akamai:
                        file-path: schemas/attack-group.yaml
                    type: array
                required:
                - attackGroupActions
                type: object
                x-akamai:
                  file-path: schemas/attack-group-actions-get-200.yaml
          description: Successfully retrieved the evaluation attack group actions.
