paths:
  /configs/{configId}/versions/{versionNumber}/advanced-settings/ja4-fingerprint:
    parameters:
    - description: A unique identifier for each configuration.
      in: path
      name: configId
      required: true
      schema:
        example: 77653
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/config-id-path.yaml
    - description: A unique identifier for each version of a configuration.
      in: path
      name: versionNumber
      required: true
      schema:
        example: 25
        type: integer
      x-akamai:
        file-path: parameters/version-number-path.yaml
    x-akamai:
      file-path: paths/config-ja4-client-tls-fingerprint.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/advanced-settings/ja4-fingerprint
    get:
      description: __Beta__, __Web Application Protector__, __Kona Site Defender__ Return JA4 client TLS fingerprint settings for a configuration. JA4 is a client-focused fingerprint based on the client TLS handshake. Use JA4 fingerprinting to mitigate DDoS attacks, detect and mitigate bots, and block known attackers from sending application layer attacks payloads. [Learn more about JA4 fingerprinting]( https://techdocs.akamai.com/app-api-protector/docs/adv-settings).
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/get-ja4-fingerprint-settings
      operationId: get-ja4-fingerprint-settings
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                headerNames:
                - ja4-fingerprint
              schema:
                additionalProperties: false
                description: The GET Response JSON for JA4 Client TLS Fingerprint.
                properties:
                  headerNames:
                    description: The header name where you add the JA4 client TLS fingerprint details.
                    items:
                      description: The header name.
                      type: string
                    maxItems: 1
                    minItems: 1
                    nullable: true
                    type: array
                    uniqueItems: true
                type: object
                x-akamai:
                  file-path: schemas/ja4-client-tls-fingerprint-get-200.yaml
          description: Successfully retrieved the JA4 client TLS fingerprint settings.
        '400':
          content:
            application/json:
              example:
