  /tokens/{tokenName}:
    parameters:
    - description: Unique identifier for each namespace.
      example: '{{tokenName}}'
      in: path
      name: tokenName
      required: true
      schema:
        example: my_token
        type: string
      x-akamai:
        file-path: parameters/tokenId-path.yaml
    get:
      description: Download a previously created EdgeKV access token. To get a token you need to know the token `name`. To learn more about access tokens, refer to the [EdgeKV guide](https://techdocs.akamai.com/edgekv/docs/generate-and-retrieve-edgekv-access-tokens).
