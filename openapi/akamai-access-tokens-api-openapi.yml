      externalDocs:
        description: See documentation for this operation in Akamai's EdgeKV API
        url: https://techdocs.akamai.com/edgekv/reference/get-token
      responses:
        '200':
          description: Returns an EdgeKV access token.
          content:
            application/json:
              example:
                expiry: '2021-09-30'
                name: my_token
                uuid: fa3a7ae0-1b0c-45c7-adc3-f0638c6b7466
                value: xxxxxxxxxxxxxxxxxxxxxxxxxxxx
              schema:
