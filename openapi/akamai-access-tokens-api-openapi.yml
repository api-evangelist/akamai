    delete:
      description: Once you revoke an access token, you can't undo it. You also need to update any deployed EdgeWorkers code bundles that use the old token with a new token, or requests to EdgeKV fail. Any requests from an EdgeWorkers code bundle using a revoked token cause a 401 error. To learn more about access tokens, refer to the [EdgeKV guide](https://techdocs.akamai.com/edgekv/docs/generate-and-retrieve-edgekv-access-tokens).
      operationId: delete-token
      summary: Akamai Revoke an Access Token
      tags:
      - Access tokens
      externalDocs:
        description: See documentation for this operation in Akamai's EdgeKV API
        url: https://techdocs.akamai.com/edgekv/reference/delete-token
      responses:
        '200':
          description: Token revocation successful.
          content:
            application/json:
              example:
                name: my_token
                uuid: fa3a7ae0-1b0c-45c7-adc3-f0638c6b7466
              schema:
                additionalProperties: false
                description: Lists properties related to an EdgeKV access token.
                type: object
                required:
