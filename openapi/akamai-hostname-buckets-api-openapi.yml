                cnameType: EDGE_HOSTNAME
                edgeHostnameId: ehn_895824
              - certProvisioningType: CPS_MANAGED
                cnameFrom: www.example3.com
                cnameType: EDGE_HOSTNAME
                edgeHostnameId: ehn_895824
