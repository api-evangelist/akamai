openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Onboarding: Activations and status API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: Manage your onboardings' activations, and the activation history for each onboarding.
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: Manage your onboardings' activations, and the activation history for each onboarding.
  name: 'Onboarding: Activations and status'
paths:
  /onboardings/{onboardingId}/activations:
    parameters:
    - description: A unique identifier for an onboarding.
      in: path
      name: onboardingId
      required: true
      schema:
        example: 101
        type: integer
      x-akamai:
        file-path: parameters/onboarding-id-path.yaml
    x-akamai:
      file-path: paths/onboarding-activations.yaml
      path-info: /onboardings/{onboardingId}/activations
    post:
      description: __App & API Protector__, __App & API Protector with the Advanced Security module__ Activate an onboarding on the staging or production networks. You need to activate on the staging network before you can activate on production. Note that with this operation you can only activate on one network at a time. Once you activate on staging you can test your site as you normally would when using Property Manager or any of our security products.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/post-onboarding-activation
      operationId: post-onboarding-activation
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      requestBody:
        content:
          application/json:
            example:
              network: STAGING
              notificationEmails:
              - test_user@akamai.com
              - test_user2@akamai.com
            schema:
              additionalProperties: false
              description: Describes the POST object to send when activating an onboarding.
              properties:
                network:
                  description: The target Akamai activation environment, either `STAGING`` or `PRODUCTION``.
                  enum:
                  - STAGING
                  - PRODUCTION
                  minLength: 1
                  type: string
                notificationEmails:
                  description: The email addresses to receive notifications regarding the activation.
                  items:
                    type: string
                  minItems: 1
                  type: array
              required:
              - notificationEmails
              - network
              type: object
              x-akamai:
                file-path: schemas/onboarding-activation-post.yaml
        required: true
      responses:
        '202':
          content:
            application/json:
              example:
                activationId: 51
                activationStatus: PENDING
                activationStatusLink: /appsec/v1/onboardings/101/activations/51
                createdBy: adevi
                createdDate: '2014-03-02T02:22:12Z'
                network: STAGING
                onboardingLink: /appsec/v1/onboardings/101
                percentComplete: 0
                retryAfter: 1200
              schema:
                additionalProperties: false
                description: Describes the response for activating an onboarding on the staging or production networks.
                properties:
                  activationId:
                    description: The unique identifier for an activation.
                    type: integer
                  activationStatus:
                    description: __Read-only__ The status of the activation. Activation can take about 20 minutes. A value of `ACTIVE` means activation succeeded and your site is ready for validation. A value of `FAILED` means the onboarding failed to activate and specific information about the failure is returned in the error response. When `PENDING`, the activation partially completed and the response shows you what additional steps you need to complete to finish your activation.
                    enum:
                    - PENDING
                    - ACTIVE
                    - FAILED
                    minLength: 1
                    readOnly: true
                    type: string
                  activationStatusLink:
                    description: The URL for the operation to request the activation status.
                    format: uri
                    type: string
                  completedDate:
                    description: The ISO 8601 timestamp when the activation reaches a steady state and validates across the Akamai network.
                    format: date-time
                    type: string
                  createdBy:
                    description: __Read-only__ The user who created the activation request.
                    minLength: 1
                    readOnly: true
                    type: string
                  createdDate:
                    description: __Read-only__ The ISO 8601 timestamp when the activation request was submitted.
                    format: date-time
                    readOnly: true
                    type: string
                  network:
                    description: Specifies the network where you are activating your onboarding, either `STAGING`, or `PRODUCTION`.
                    enum:
                    - STAGING
                    - PRODUCTION
                    minLength: 1
                    type: string
                  onboardingLink:
                    description: The URL to get the onboarding's details.
                    minLength: 1
                    type: string
                  percentComplete:
                    description: The percentage of the activation that is complete.
                    type: integer
                  retryAfter:
                    description: The time remaining, in seconds, until the activation finishes. If your activation fails and you need to try activating again, you won't be able to until this value reaches `0`.
                    type: integer
                required:
                - activationId
                - activationStatus
                - network
                - createdDate
                - createdBy
                - activationStatusLink
                - onboardingLink
                type: object
                x-akamai:
                  file-path: schemas/onboarding-activation-post-202.yaml
          description: Successfully updated the onboarding settings.
        '403':
          content:
            application/problem+json:
              example:
                detail: You do not have the necessary access to perform this operation or the requested resource cannot be modified
                instance: https://problems.luna.akamaiapis.net/appsec/error-instances/d54686b5-21cb-4ab7-a8d6-a92282cf1749
                status: 403
                title: Forbidden
                type: https://problems.luna.akamaiapis.net/appsec-resource/error-types/ACCESS-DENIED
              schema:
                additionalProperties: true
                description: Details the errors you can receive.
                properties:
                  detail:
                    description: The detailed error message.
                    type: string
                  fieldErrors:
                    description: Pointers to fields for which invalid input was provided, whose values are messages detailing the reason this input was invalid for this field.
                    type: object
                  instance:
                    description: The non-referenceable URI that indicates the error instance.
                    example: https://problems.luna.akamaiapis.net/api-definitions/error-instances/d54686b5-21cb-4ab7-a8d6-a92282cf1749
                    type: string
                  status:
