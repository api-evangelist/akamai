                - detail
                - instance
                - status
                type: object
                x-akamai:
                  file-path: schemas/problem-details.yaml
          description: '[Not found](https://techdocs.akamai.com/application-security/reference/404). Onboarding was not found.'
          x-akamai:
            file-path: errors/404.yaml
        '409':
          content:
            application/problem+json:
              examples:
                activation-network-error:
                  summary: Activation network error
                  value:
                    $ref: ../examples/409-onboarding-activation-network-error.json
              schema:
                additionalProperties: true
                description: Details the errors you can receive.
                properties:
                  detail:
                    description: The detailed error message.
                    type: string
                  fieldErrors:
                    description: Pointers to fields for which invalid input was provided, whose values are messages detailing the reason this input was invalid for this field.
                    type: object
                  instance:
                    description: The non-referenceable URI that indicates the error instance.
                    example: https://problems.luna.akamaiapis.net/api-definitions/error-instances/d54686b5-21cb-4ab7-a8d6-a92282cf1749
                    type: string
                  status:
                    description: The HTTP status code.
                    example: 404
                    type: integer
                  title:
                    description: The error title.
                    example: Not Found
                    type: string
                  type:
                    description: The URL for the error type.
                    example: https://problems.luna.akamaiapis.net/api-definitions/error-types/NOT-FOUND
                    type: string
                required:
                - title
                - type
                - detail
                - instance
                - status
                type: object
                x-akamai:
                  file-path: schemas/problem-details.yaml
          description: '[Conflict](https://techdocs.akamai.com/application-security/reference/409). Invalid onboarding Activation Request. See the `fieldErrors` and other fields provided in the response for more information.'
          x-akamai:
            file-path: errors/409-onboarding-activation.yaml
        '422':
          content:
            application/problem+json:
              examples:
                activation-errors:
                  summary: Unprocessable activation request
                  value:
                    $ref: ../examples/422-onboarding-activation-network-error.json
              schema:
                additionalProperties: true
                description: Details the errors you can receive.
                properties:
