    x-akamai:
      file-path: paths/reporting-group-products.yaml
      path-for-file: /reporting-groups/{reportingGroupId}/products
    parameters:
    - description: The identifier for the reporting group.
      example: '{{reportingGroupId}}'
      in: path
      name: reportingGroupId
      required: true
      schema:
        example: 101010
        type: integer
      x-akamai:
        file-path: parameters/reportingGroupId-path.yaml
    get:
      description: Lists products and services assigned to a specific reporting group.
      operationId: get-reporting-group-products
      summary: List products within a reporting group
      tags:
      - Products
      externalDocs:
        description: See documentation for this operation in Akamai's CP Codes and Reporting Groups API
        url: https://techdocs.akamai.com/cp-codes/reference/get-reporting-group-products
      responses:
        '200':
          description: Lists products and services assigned to a specific reporting group.
          content:
            application/json:
              example:
                products:
                - productId: Dev::Cloud
                  productName: Cloud development CD
                - productId: AdvSite::Reporter
                  productName: Monitor site advance
              schema:
                additionalProperties: false
                description: Provides information about products and services assigned to a specific reporting group.
                type: object
                required:
                - products
                properties:
                  products:
                    description: A collection of products and services assigned to the reporting group.
                    minItems: 0
                    type: array
                    items:
                      additionalProperties: false
                      description: Specifies details of a single product.
                      type: object
                      required:
                      - productId
                      properties:
                        productId:
                          description: 'Identifies a product or service.


                            **Note**: See [ID prefixes](https://techdocs.akamai.com/cp-codes/reference/id-prefixes) for guidance on comparing this value with data from PAPI.'
                          minLength: 1
                          type: string
                        productName:
                          description: The descriptive label for a product or service.
                          minLength: 1
                          type: string
                    x-akamai:
                      file-path: schemas/products-array.yaml
                x-akamai:
                  file-path: schemas/reporting-group-products-200.yaml
