                                  title: Number
                                  type: number
                        jwks:
                          additionalProperties: false
                          description: Contains information about a JSON web key set to load public keys from. Specify this object only if the corresponding `method` member is `JWKS`.
                          nullable: true
                          type: object
                          properties:
