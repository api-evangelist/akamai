      required: true
      schema:
        example: 112231
        format: int64
        type: integer
      x-akamai:
        file-path: parameters/url-protection-policy-id-path.yaml
    x-akamai:
      file-path: paths/policy-url-protection.yaml
      path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/url-protections/{urlProtectionPolicyId}
    put:
      description: __All products__ Updates the actions in a URL protection policy.
      externalDocs:
        description: See documentation for this operation in Akamai's Application Security API
        url: https://techdocs.akamai.com/application-security/reference/put-url-protection-policy-action
      operationId: put-url-protection-policy-action
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
      requestBody:
        content:
          application/json:
            example:
              action: none
              loadSheddingAction: alert
            schema:
              additionalProperties: false
              description: Contains details about a URL protection policy action.
              properties:
                action:
                  description: The action to assign to this URL protection policy once the rate control threshold is reached. Choose `alert`, `deny`, `none`, `deny_custom_{custom_deny_id}` or `challenge_{id}`. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions. If the action is `none`, the URL protection policy is inactive in the policy. Refer to [Challenge actions](https://techdocs.akamai.com/app-api-protector/docs/challenge-actions) for details.
                  oneOf:
                  - enum:
                    - alert
                    - deny
                    - none
                    title: Predefined actions
                    type: string
                  - minLength: 1
                    pattern: ^(deny_custom|challenge)_[0-9]+$
                    title: Custom actions
                    type: string
                loadSheddingAction:
                  description: The action to assign to this URL protection policy once the intelligent load shedding threshold is reached. Choose `alert`, `deny`, `none`, `deny_custom_{custom_deny_id}` or `challenge_{id}`. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions. If the action is `none`, the URL protection policy is inactive in the policy. Refer to [Challenge actions](https://techdocs.akamai.com/app-api-protector/docs/challenge-actions) for details.
                  oneOf:
                  - enum:
                    - alert
                    - deny
                    - none
                    title: Predefined actions
                    type: string
                  - minLength: 1
                    pattern: ^(deny_custom|challenge)_[0-9]+$
                    title: Custom actions
                    type: string
              required:
              - action
              type: object
              x-akamai:
                file-path: schemas/url-protection-policy-action-put.yaml
        required: true
      responses:
        '200':
          content:
            application/json:
              example:
                action: none
                loadSheddingAction: alert
              schema:
                additionalProperties: false
                description: Contains details about a URL protection policy action.
                properties:
                  action:
                    description: The action to assign to this URL protection policy once the rate control threshold is reached. Choose `alert`, `deny`, `none`, `deny_custom_{custom_deny_id}` or `challenge_{id}`. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions. If the action is `none`, the URL protection policy is inactive in the policy. Refer to [Challenge actions](https://techdocs.akamai.com/app-api-protector/docs/challenge-actions) for details.
                    oneOf:
                    - enum:
                      - alert
                      - deny
                      - none
                      title: Predefined actions
                      type: string
                    - minLength: 1
                      pattern: ^(deny_custom|challenge)_[0-9]+$
                      title: Custom actions
                      type: string
                  loadSheddingAction:
                    description: The action to assign to this URL protection policy once the intelligent load shedding threshold is reached. Choose `alert`, `deny`, `none`, `deny_custom_{custom_deny_id}` or `challenge_{id}`. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions. If the action is `none`, the URL protection policy is inactive in the policy. Refer to [Challenge actions](https://techdocs.akamai.com/app-api-protector/docs/challenge-actions) for details.
                    oneOf:
                    - enum:
                      - alert
                      - deny
                      - none
                      title: Predefined actions
                      type: string
                    - minLength: 1
                      pattern: ^(deny_custom|challenge)_[0-9]+$
                      title: Custom actions
                      type: string
                required:
                - action
                type: object
                x-akamai:
                  file-path: schemas/url-protection-policy-action-put.yaml
          description: Updated action.
