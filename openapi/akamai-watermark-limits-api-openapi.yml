paths:
  /cpcodes/contracts/{contractId}/watermark-limits:
    x-akamai:
      file-path: paths/cpcodes-watermark-limit.yaml
      path-for-file: /cpcodes/contracts/{contractId}/watermark-limits
    parameters:
    - description: The identifier for the contract for which you want to check water-mark limits.
      example: '{{contractId}}'
      in: path
      name: contractId
      required: true
      schema:
        example: 1Q004
        type: string
      x-akamai:
        file-path: parameters/contractId-path.yaml
    get:
      description: Get a watermark limit for CP codes for a specific contract within your account. For more details, see [Rate and resource limiting](https://techdocs.akamai.com/cp-codes/reference/rate-and-resource-limiting).
      operationId: get-cpcodes-watermark-limits
      summary: Get a water-mark limit
      tags:
      - Watermark limits
      externalDocs:
        description: See documentation for this operation in Akamai's CP Codes and Reporting Groups API
        url: https://techdocs.akamai.com/cp-codes/reference/get-cpcodes-watermark-limits
      responses:
        '200':
          description: Provides the current number of resources and available limit.
          content:
            application/json:
              example:
                currentCapacity: 3500
                limit: 5000
                limitType: account
              schema:
                additionalProperties: false
                description: Provides watermark limits for CP codes or reporting groups within a specific contract.
                type: object
                required:
                - currentCapacity
                - limit
                - limitType
                properties:
                  currentCapacity:
                    description: The current number of CP codes or reporting groups.
                    minimum: 0
                    type: integer
                  limit:
                    description: The number of allowed CP codes or reporting groups.
                    minimum: 0
                    type: integer
                  limitType:
                    description: Identifies whether the `limit` applies to an account or a contract. For more details, see [Rate and resource limiting](https://techdocs.akamai.com/cp-codes/reference/rate-and-resource-limiting).
                    minLength: 1
                    type: string
                x-akamai:
                  file-path: schemas/watermark-limits-200.yaml
