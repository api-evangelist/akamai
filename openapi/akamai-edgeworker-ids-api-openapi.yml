openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens EdgeWorker IDs API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- name: EdgeWorker IDs
paths:
  /ids:
    post:
      description: Register a new EdgeWorker within a particular group.
      operationId: post-ids
      summary: Akamai Create a New EdgeWorker ID
      tags:
      - EdgeWorker IDs
      externalDocs:
        description: See documentation for this operation in Akamai's EdgeWorkers API
        url: https://techdocs.akamai.com/edgeworkers/reference/post-ids
      requestBody:
        required: true
        content:
          application/json:
            example:
              description: Geo-blocking EdgeWorker
              groupId: 72297
              name: Ew_42
              resourceTierId: 100
            schema:
              additionalProperties: false
              type: object
              required:
              - groupId
              - name
              - resourceTierId
              properties:
                description:
                  description: Description of the EdgeWorker.
                  example: '{{description}}'
                  maxLength: 128
                  minLength: 1
                  type: string
                groupId:
                  description: Identifies a group to assign to the EdgeWorker.
                  example: '{{groupId}}'
                  minimum: 1
                  type: integer
                name:
                  description: A name you assign to the EdgeWorker.
                  example: '{{name}}'
                  minLength: 1
                  type: string
                resourceTierId:
                  description: Unique identifier of a resource tier. The resource tier is write-once data. To change the resource tier you need to [Clone an EdgeWorker ID](https://techdocs.akamai.com/edgeworkers/reference/post-id-clone).
                  example: '{{resourceTierId}}'
                  minimum: 1
                  type: integer
              x-akamai:
                file-path: schemas/ids-post.yaml
      responses:
        '201':
          description: This section describes attributes of an EdgeWorker registration.
          content:
            application/json:
              example:
                accountId: A-CCT7890
                createdBy: jsmith
                createdTime: '2020-10-15T14:49:40Z'
                description: Geo-blocking EdgeWorker
                edgeWorkerId: 42
                groupId: 72297
                lastModifiedBy: jsmith
                lastModifiedTime: '2020-10-15T15:21:15Z'
                name: Ew_42
                resourceTierId: 200
              schema:
                additionalProperties: false
                type: object
                required:
                - name
                - resourceTierId
                - groupId
                properties:
                  accountId:
                    description: Identifier for the account under which the EdgeWorker was created.
                    minLength: 1
                    type: string
                  createdBy:
                    description: Username of the person who created the EdgeWorker.
                    minLength: 1
                    type: string
                  createdTime:
                    description: ISO 8601 timestamp indicating when the EdgeWorker was created.
                    format: date-time
                    type: string
                  description:
                    description: Description of the EdgeWorker.
                    maxLength: 128
                    minLength: 1
                    type: string
                  edgeWorkerId:
                    description: Unique identifier of the EdgeWorker.
                    minimum: 1
                    type: integer
                  groupId:
                    description: Group identified by the user who created the EdgeWorker.
                    minimum: 1
                    type: integer
                  lastModifiedBy:
                    description: Username of the person who most recently updated the EdgeWorker.
                    minLength: 1
                    type: string
                  lastModifiedTime:
                    description: ISO 8601 timestamp indicating when the EdgeWorker was most recently modified.
                    format: date-time
                    type: string
                  name:
                    description: Name given by the user who created the EdgeWorker.
                    minLength: 1
                    type: string
                  resourceTierId:
                    description: Resource tier selected when the EdgeWorker was created.
                    minimum: 1
                    type: integer
                x-akamai:
                  file-path: schemas/ids-post-201.yaml
          headers:
            Location:
              description: Use this URL to fetch the new resource.
              schema:
                type: string
              x-akamai:
                file-path: headers/Location.yaml
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        example: '{{accountSwitchKey}}'
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
    get:
      description: View a list of EdgeWorker IDs created for your account. You can choose to specify the group and resource tier in the request to filter the response.
      operationId: get-ids
      summary: Akamai List EdgeWorker IDs
      tags:
      - EdgeWorker IDs
      externalDocs:
        description: See documentation for this operation in Akamai's EdgeWorkers API
        url: https://techdocs.akamai.com/edgeworkers/reference/get-ids
      responses:
        '200':
          description: Describes a list of EdgeWorker IDs.
          content:
            application/json:
              example:
                edgeWorkerIds:
                - accountId: A-CCT9012
                  createdBy: jsmith
                  createdTime: '2020-10-15T14:49:40Z'
                  description: Geo-blocking EdgeWorker
                  edgeWorkerId: 1
                  groupId: 72297
                  lastModifiedBy: jsmith
                  lastModifiedTime: '2020-10-15T15:21:15Z'
                  name: Ew_1
                  resourceTierId: 100
                - accountId: A-CCT7890
                  createdBy: jsmith
                  createdTime: '2020-10-15T16:54:40Z'
                  edgeWorkerId: 2
                  groupId: 72297
                  lastModifiedBy: jsmith
                  lastModifiedTime: '2020-10-15T16:54:40Z'
                  name: 'EdgeWorker #2'
                  resourceTierId: 200
              schema:
                additionalProperties: false
                type: object
                required:
                - edgeWorkerIds
                properties:
                  edgeWorkerIds:
                    description: List of EdgeWorker IDs.
                    minItems: 1
                    type: array
                    items:
                      additionalProperties: false
                      type: object
                      required:
                      - accountId
                      - createdBy
                      - createdTime
                      - edgeWorkerId
                      - groupId
                      - lastModifiedBy
                      - lastModifiedTime
                      - name
                      - resourceTierId
                      properties:
                        accountId:
                          description: Identifier for the account under which the EdgeWorker was created.
                          minLength: 1
                          type: string
                        createdBy:
                          description: Username of the person who created the EdgeWorker.
                          minLength: 1
                          type: string
                        createdTime:
                          description: ISO 8601 timestamp indicating when the EdgeWorker was created.
                          format: date-time
                          type: string
                        description:
                          description: Description of the EdgeWorker.
                          maxLength: 128
                          minLength: 1
                          type: string
                        edgeWorkerId:
                          description: Unique identifier of the EdgeWorker.
                          minimum: 1
                          type: integer
                        groupId:
                          description: Group identified by the user who created the EdgeWorker.
                          minimum: 1
                          type: integer
                        lastModifiedBy:
                          description: Username of the person who most recently updated the EdgeWorker.
                          minLength: 1
                          type: string
                        lastModifiedTime:
                          description: ISO 8601 timestamp indicating when the EdgeWorker was most recently modified.
                          format: date-time
                          type: string
                        name:
                          description: Name given by the user who created the EdgeWorker.
                          minLength: 1
                          type: string
                        resourceTierId:
                          description: Resource tier selected when the EdgeWorker was created.
                          minimum: 1
                          type: integer
                      x-akamai:
                        file-path: schemas/id-get-200.yaml
                x-akamai:
                  file-path: schemas/ids-get-200.yaml
      parameters:
      - description: Unique identifier for the Akamai group containing the EdgeWorker.
        example: '{{groupId}}'
        in: query
        name: groupId
        schema:
          example: 72297
          type: integer
        x-akamai:
          file-path: parameters/groupId-query.yaml
      - description: Unique identifier of the resource tier.
        example: '{{resourceTierId}}'
        in: query
        name: resourceTierId
        schema:
          example: 100
          type: integer
        x-akamai:
          file-path: parameters/resourceTierId-query.yaml
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        example: '{{accountSwitchKey}}'
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
  /ids/{edgeWorkerId}:
