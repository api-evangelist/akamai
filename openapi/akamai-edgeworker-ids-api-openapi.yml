                    type: string
                  createdBy:
                    description: Username of the person who created the EdgeWorker.
                    minLength: 1
                    type: string
                  createdTime:
                    description: ISO 8601 timestamp indicating when the EdgeWorker was created.
                    format: date-time
                    type: string
                  description:
                    description: Description of the EdgeWorker.
                    maxLength: 128
                    minLength: 1
                    type: string
                  edgeWorkerId:
                    description: Unique identifier of the EdgeWorker.
                    minimum: 1
                    type: integer
                  groupId:
                    description: Group identified by the user who created the EdgeWorker.
                    minimum: 1
                    type: integer
                  lastModifiedBy:
                    description: Username of the person who most recently updated the EdgeWorker.
                    minLength: 1
                    type: string
                  lastModifiedTime:
                    description: ISO 8601 timestamp indicating when the EdgeWorker was most recently modified.
                    format: date-time
                    type: string
                  name:
                    description: Name given by the user who created the EdgeWorker.
                    minLength: 1
                    type: string
                  resourceTierId:
                    description: Resource tier selected when the EdgeWorker was created.
                    minimum: 1
                    type: integer
                x-akamai:
                  file-path: schemas/id-get-200.yaml
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        example: '{{accountSwitchKey}}'
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
    put:
      description: Update the `name` or `groupId` of an existing EdgeWorker.
      operationId: put-id
      summary: Akamai Update an EdgeWorker ID
      tags:
      - EdgeWorker IDs
      externalDocs:
        description: See documentation for this operation in Akamai's EdgeWorkers API
        url: https://techdocs.akamai.com/edgeworkers/reference/put-id
      requestBody:
        required: true
        content:
          application/json:
            example:
              description: New Description
              groupId: 123456
              name: New EdgeWorker Name
            schema:
              additionalProperties: false
              type: object
              properties:
                description:
                  description: Description of the EdgeWorker.
                  example: '{{description}}'
                  maxLength: 128
                  minLength: 0
                  type: string
                groupId:
                  description: Identifies a group to assign to the EdgeWorker.
                  example: '{{groupId}}'
                  minimum: 1
                  type: integer
                name:
                  description: A name you assign to the EdgeWorker.
                  example: '{{name}}'
                  minLength: 1
                  type: string
              x-akamai:
                file-path: schemas/id-put.yaml
      responses:
        '200':
          description: This section describes attributes of an EdgeWorker registration.
          content:
            application/json:
              example:
                accountId: A-CCT9012
                createdBy: jsmith
                createdTime: '2020-10-15T14:49:40Z'
                description: New Description
                edgeWorkerId: 42
                groupId: 72297
                lastModifiedBy: jsmith
                lastModifiedTime: '2020-10-15T15:21:15Z'
                name: New EdgeWorker Name
                resourceTierId: 200
              schema:
                additionalProperties: false
                type: object
                required:
                - accountId
                - createdBy
                - createdTime
                - edgeWorkerId
                - groupId
                - lastModifiedBy
                - lastModifiedTime
                - name
                - resourceTierId
                properties:
                  accountId:
                    description: Identifier for the account under which the EdgeWorker was created.
                    minLength: 1
                    type: string
                  createdBy:
                    description: Username of the person who created the EdgeWorker.
                    minLength: 1
                    type: string
                  createdTime:
                    description: ISO 8601 timestamp indicating when the EdgeWorker was created.
                    format: date-time
                    type: string
                  description:
                    description: Description of the EdgeWorker.
                    maxLength: 128
                    minLength: 1
                    type: string
                  edgeWorkerId:
                    description: Unique identifier of the EdgeWorker.
                    minimum: 1
                    type: integer
                  groupId:
                    description: Group identified by the user who created the EdgeWorker.
                    minimum: 1
                    type: integer
                  lastModifiedBy:
                    description: Username of the person who most recently updated the EdgeWorker.
                    minLength: 1
                    type: string
                  lastModifiedTime:
                    description: ISO 8601 timestamp indicating when the EdgeWorker was most recently modified.
                    format: date-time
                    type: string
                  name:
                    description: Name given by the user who created the EdgeWorker.
                    minLength: 1
                    type: string
                  resourceTierId:
                    description: Resource tier selected when the EdgeWorker was created.
                    minimum: 1
                    type: integer
                x-akamai:
                  file-path: schemas/id-put-200.yaml
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        example: '{{accountSwitchKey}}'
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
    delete:
      description: Delete a specific EdgeWorker ID.
      operationId: delete-id
      summary: Akamai Delete an EdgeWorker ID
      tags:
      - EdgeWorker IDs
      externalDocs:
        description: See documentation for this operation in Akamai's EdgeWorkers API
        url: https://techdocs.akamai.com/edgeworkers/reference/delete-id
      responses:
        '204':
          description: Confirms the deletion of the EdgeWorker ID.
          content:
            '*/*': {}
      parameters:
      - description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client). The Identity and Access Management API provides a [list of available account switch keys](https://techdocs.akamai.com/iam-api/reference/get-client-account-switch-keys).
        example: '{{accountSwitchKey}}'
        in: query
        name: accountSwitchKey
        required: false
        schema:
          example: 1-5C0YLB:1-8BYUX
          type: string
  /ids/{edgeWorkerId}/clone:
    parameters:
    - description: Unique identifier for an EdgeWorker.
      example: '{{edgeWorkerId}}'
      in: path
      name: edgeWorkerId
      required: true
      schema:
        example: 42
        minimum: 1
        type: integer
      x-akamai:
        file-path: parameters/edgeWorkerId-path.yaml
    post:
      description: Clone an EdgeWorker ID to change the resource tier.
      operationId: post-id-clone
      summary: Akamai Clone an EdgeWorker ID
      tags:
      - EdgeWorker IDs
      externalDocs:
        description: See documentation for this operation in Akamai's EdgeWorkers API
        url: https://techdocs.akamai.com/edgeworkers/reference/post-id-clone
      requestBody:
        required: true
        content:
          application/json:
            example:
              description: Clone of EdgeWorker ID 42
              groupId: 72297
              name: Ew_42
              resourceTierId: 200
            schema:
              additionalProperties: false
              type: object
              required:
              - resourceTierId
              properties:
                description:
                  description: Description of the EdgeWorker.
                  example: '{{description}}'
                  maxLength: 128
                  minLength: 0
                  type: string
                groupId:
                  description: Identifies a group to assign to the EdgeWorker.
                  example: '{{groupId}}'
                  minimum: 1
                  type: integer
                name:
                  description: A name you assign to the EdgeWorker.
                  example: '{{name}}'
                  minLength: 1
                  type: string
                resourceTierId:
                  description: Unique identifier of a resource tier.
                  example: '{{resourceTierId}}'
                  minimum: 1
                  type: integer
              x-akamai:
                file-path: schemas/id-clone.yaml
      responses:
        '201':
          description: This section describes attributes of an EdgeWorker registration.
          content:
            application/json:
              example:
                accountId: A-CCT5678
                createdBy: jsmith
                createdTime: '2020-10-15T14:49:40Z'
                description: Clone of EdgeWorker ID 42
                edgeWorkerId: 43
                groupId: 72297
                lastModifiedBy: jsmith
                lastModifiedTime: '2020-10-15T15:21:15Z'
                name: Ew_42
                resourceTierId: 100
                sourceEdgeWorkerId: 42
              schema:
                additionalProperties: false
                type: object
                required:
                - accountId
                - createdBy
                - createdTime
                - edgeWorkerId
                - groupId
                - lastModifiedBy
                - lastModifiedTime
                - name
                - resourceTierId
                - sourceEdgeWorkerId
                properties:
                  accountId:
                    description: Identifier for the account under which the EdgeWorker was created.
                    minLength: 1
                    type: string
                  createdBy:
                    description: Username of the person who created the EdgeWorker.
                    minLength: 1
                    type: string
                  createdTime:
                    description: ISO 8601 timestamp indicating when the EdgeWorker was created.
                    format: date-time
                    type: string
                  description:
                    description: Description of the EdgeWorker.
                    maxLength: 128
                    minLength: 1
                    type: string
                  edgeWorkerId:
                    description: Unique identifier of the EdgeWorker.
                    minimum: 1
                    type: integer
                  groupId:
                    description: Group identified by the user who created the EdgeWorker.
                    minimum: 1
                    type: integer
                  lastModifiedBy:
                    description: Username of the person who most recently updated the EdgeWorker.
                    minLength: 1
                    type: string
                  lastModifiedTime:
                    description: ISO 8601 timestamp indicating when the EdgeWorker was most recently modified.
                    format: date-time
                    type: string
                  name:
                    description: Name given by the user who created the EdgeWorker.
                    minLength: 1
                    type: string
                  resourceTierId:
                    description: Resource tier selected when the EdgeWorker was created.
                    minimum: 1
                    type: integer
                  sourceEdgeWorkerId:
                    description: EdgeWorker ID used to create the current EdgeWorker ID. The `sourceEdgeWorkerId` also appears when you view the details of a cloned EdgeWorker ID using the [Get an Edgeworker ID](https://techdocs.akamai.com/edgeworkers/reference/get-id) operation.
                    minimum: 1
                    type: integer
                x-akamai:
                  file-path: schemas/id-clone-201.yaml
          headers:
            Location:
              description: Use this URL to fetch the new resource.
              schema:
                type: string
