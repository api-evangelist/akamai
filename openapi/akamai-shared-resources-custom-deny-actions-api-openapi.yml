openapi: 3.0.0
info:
  title: 'Akamai: API Endpoint Definition Access tokens Shared resources: Custom deny actions API'
  version: '2'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: 'Manage your custom deny actions for security configurations and

    policies.  Custom deny actions let you serve error messages,

    pages, and responses that meet your organization''s unique needs.'
servers:
- url: https://{hostname}/api-definitions/v2
tags:
- description: 'Manage your custom deny actions for security configurations and

    policies.  Custom deny actions let you serve error messages,

    pages, and responses that meet your organization''s unique needs.'
  name: 'Shared resources: Custom deny actions'
paths:
  /configs/{configId}/versions/{versionNumber}/custom-deny:
