naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: Application Security API — Reputation analysis'
  description: 'Akamai: Application Security API — Reputation analysis. 2 operations. Lead operation: Akamai Get reputation analysis settings. Self-contained Naftiko capability covering
    one Akamai business surface.'
  tags:
  - Akamai
  - Application Security
  - Reputation analysis
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: appsec-reputation-analysis
    baseUri: https://{hostname}/appsec/v1
    description: 'Akamai: Application Security API — Reputation analysis business capability. Self-contained, no shared references.'
    resources:
    - name: configs-configId-versions-versionNumber-security-policies-po
      path: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/reputation-analysis
      operations:
      - name: getget-reputation-analysis
        method: GET
        description: Get reputation analysis settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
      - name: putput-reputation-analysis
        method: PUT
        description: Modify reputation analysis settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
