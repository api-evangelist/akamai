naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: EdgeWorkers API — Limits'
  description: 'Akamai: EdgeWorkers API — Limits. 1 operations. Lead operation: Akamai List Limits. Self-contained Naftiko
    capability covering one Akamai business surface.'
  tags:
  - Akamai
  - Limits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: edgeworkers-limits
    baseUri: https://{hostname}/edgeworkers/v1
    description: 'Akamai: EdgeWorkers API — Limits business capability. Self-contained, no shared references.'
    resources:
    - name: limits
      path: /limits
      operations:
      - name: getlimits
        method: GET
        description: Akamai List Limits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-w
  exposes:
  - type: rest
    namespace: edgeworkers-limits-rest
    port: 8080
    description: 'REST adapter for Akamai: EdgeWorkers API — Limits. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.'
    resources:
    - path: /v1/limits
      name: limits
      description: REST surface for limits.
      operations:
      - method: GET
        name: getlimits
        description: Akamai List Limits
        call: edgeworkers-limits.getlimits
        with:
          accountSwitchKey: rest.accountSwitchKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: edgeworkers-limits-mcp
    port: 9090
    transport: http
    description: 'MCP adapter for Akamai: EdgeWorkers API — Limits. One tool per consumed operation, routed inline through
      this capability''s consumes block.'
    tools:
    - name: akamai-list-limits
      description: Akamai List Limits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: edgeworkers-limits.getlimits
      with:
        accountSwitchKey: tools.accountSwitchKey
      outputParameters:
      - type: object
        mapping: $.
