naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: Property Manager API — Contracts'
  description: 'Akamai: Property Manager API — Contracts. 1 operations. Lead operation: Akamai List Contracts. Self-contained
    Naftiko capability covering one Akamai business surface.'
  tags:
  - Akamai
  - Contracts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: papi-contracts
    baseUri: https://{hostname}/papi/v1
    description: 'Akamai: Property Manager API — Contracts business capability. Self-contained, no shared references.'
    resources:
    - name: contracts
      path: /contracts
      operations:
      - name: getcontracts
        method: GET
        description: Akamai List Contracts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: PAPI-Use-Prefixes
          in: header
          type: string
          description: __Enum__ Sets whether to represent [ID prefixes](https://techdocs.akamai.com/property-mgr/reference/id-prefixes)
            in response data. Set to `false` when exchangin
          required: true
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-w
  exposes:
  - type: rest
    namespace: papi-contracts-rest
    port: 8080
    description: 'REST adapter for Akamai: Property Manager API — Contracts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.'
    resources:
    - path: /v1/contracts
      name: contracts
      description: REST surface for contracts.
      operations:
      - method: GET
        name: getcontracts
        description: Akamai List Contracts
        call: papi-contracts.getcontracts
        with:
          PAPI-Use-Prefixes: rest.PAPI-Use-Prefixes
          accountSwitchKey: rest.accountSwitchKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: papi-contracts-mcp
    port: 9090
    transport: http
    description: 'MCP adapter for Akamai: Property Manager API — Contracts. One tool per consumed operation, routed inline
      through this capability''s consumes block.'
    tools:
    - name: akamai-list-contracts
      description: Akamai List Contracts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: papi-contracts.getcontracts
      with:
        PAPI-Use-Prefixes: tools.PAPI-Use-Prefixes
        accountSwitchKey: tools.accountSwitchKey
      outputParameters:
      - type: object
        mapping: $.
