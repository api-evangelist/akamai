    resources:
    - name: configs-configId-versions-versionNumber-advanced-settings-re
      path: /configs/{configId}/versions/{versionNumber}/advanced-settings/request-body
      operations:
      - name: getget-advanced-settings-request-body
        method: GET
        description: Get request body size settings for a configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
      - name: putput-advanced-settings-request-body
        method: PUT
        description: Modify request body inspection limit settings for a configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
