naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: API Endpoint Definition API — GraphQL'
  description: 'Akamai: API Endpoint Definition API — GraphQL. 2 operations. Lead operation: Akamai Get GraphQL cache settings. Self-contained Naftiko capability covering one Akamai
    business surface.'
  tags:
  - Akamai
  - API Definitions
  - GraphQL
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-definitions-graphql
    baseUri: https://{hostname}/api-definitions/v2
    description: 'Akamai: API Endpoint Definition API — GraphQL business capability. Self-contained, no shared references.'
    resources:
    - name: endpoints-apiEndPointId-versions-versionNumber-settings-grap
      path: /endpoints/{apiEndPointId}/versions/{versionNumber}/settings/graphql
      operations:
      - name: getget-graphql-settings
        method: GET
        description: Get GraphQL cache settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
      - name: putput-graphql-settings
        method: PUT
        description: Edit GraphQL cache settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
