naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: Application Security API — PII learning'
  description: 'Akamai: Application Security API — PII learning. 2 operations. Lead operation: Akamai Get PII learning settings for a configuration. Self-contained Naftiko capability
    covering one Akamai business surface.'
  tags:
  - Akamai
  - Application Security
  - PII learning
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: appsec-pii-learning
    baseUri: https://{hostname}/appsec/v1
    description: 'Akamai: Application Security API — PII learning business capability. Self-contained, no shared references.'
    resources:
    - name: configs-configId-versions-versionNumber-advanced-settings-pi
      path: /configs/{configId}/versions/{versionNumber}/advanced-settings/pii-learning
      operations:
      - name: getget-advanced-settings-pii-learning
        method: GET
        description: Get PII learning settings for a configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
      - name: putput-advanced-settings-pii-learning
        method: PUT
        description: Enable PII learning settings for a configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
