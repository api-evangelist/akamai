naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: Application Security API — Security policy: Conditions and exceptions'
  description: 'Akamai: Application Security API — Security policy: Conditions and exceptions. 4 operations. Lead operation: Akamai Get the exceptions of an evaluation attack group.
    Self-contained Naftiko capability covering one Akamai business surface.'
  tags:
  - Akamai
  - Application Security
  - 'Security policy: Conditions and exceptions'
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
