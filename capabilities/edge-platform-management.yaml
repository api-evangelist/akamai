naftiko: 1.0.0-alpha2
info:
  label: Akamai Edge Platform Management
  description: Unified workflow for managing Akamai edge platform resources including EdgeWorkers serverless functions, network
    lists, and property configurations. For platform engineers and DevOps teams managing Akamai delivery configurations.
  tags:
  - Akamai
  - CDN
  - Edge Computing
  - Platform Management
  - Network Security
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AKAMAI_CLIENT_TOKEN: AKAMAI_CLIENT_TOKEN
    AKAMAI_CLIENT_SECRET: AKAMAI_CLIENT_SECRET
    AKAMAI_ACCESS_TOKEN: AKAMAI_ACCESS_TOKEN
    AKAMAI_EDGEGRID_HOST: AKAMAI_EDGEGRID_HOST
capability:
  consumes:
  - type: http
    namespace: akamai-edgeworkers
    baseUri: https://{hostname}/edgeworkers/v1
    description: EdgeWorkers API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AKAMAI_EDGEGRID_AUTH}}'
      placement: header
    resources:
    - name: edgeworkers
      path: /ids
      description: EdgeWorker identifiers
      operations:
      - name: list-edgeworkers
        method: GET
        description: List all EdgeWorker identifiers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-edgeworker
        method: POST
        description: Create a new EdgeWorker identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: akamai-network-lists
    baseUri: https://{hostname}/network-list/v2
    description: Network Lists API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AKAMAI_EDGEGRID_AUTH}}'
      placement: header
    resources:
    - name: network-lists
      path: /network-lists
      description: Network list management
      operations:
      - name: list-network-lists
        method: GET
        description: List all network lists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: edge-platform-management-api
    description: Unified REST API for Akamai edge platform management.
    resources:
    - path: /v1/edgeworkers
      name: edgeworkers
      description: EdgeWorker serverless function management
      operations:
      - method: GET
        name: list-edgeworkers
        description: List EdgeWorker identifiers
        call: akamai-edgeworkers.list-edgeworkers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-edgeworker
        description: Create EdgeWorker
        call: akamai-edgeworkers.create-edgeworker
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/network-lists
      name: network-lists
      description: Network list management
      operations:
      - method: GET
        name: list-network-lists
        description: List network lists
        call: akamai-network-lists.list-network-lists
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: edge-platform-management-mcp
    transport: http
    description: MCP server for AI-assisted Akamai edge platform management.
    tools:
    - name: list-edgeworkers
      description: List all Akamai EdgeWorker serverless functions
      hints:
        readOnly: true
        openWorld: true
      call: akamai-edgeworkers.list-edgeworkers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-edgeworker
      description: Create a new Akamai EdgeWorker serverless function
      hints:
        readOnly: false
        destructive: false
      call: akamai-edgeworkers.create-edgeworker
      outputParameters:
      - type: object
        mapping: $.
    - name: list-network-lists
      description: List all Akamai network lists for IP and geographic access control
      hints:
        readOnly: true
        openWorld: true
      call: akamai-network-lists.list-network-lists
      outputParameters:
      - type: object
        mapping: $.
