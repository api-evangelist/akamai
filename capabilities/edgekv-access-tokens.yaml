naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: EdgeKV API — Access tokens'
  description: 'Akamai: EdgeKV API — Access tokens. 4 operations. Lead operation: Akamai Create an Access Token. Self-contained
    Naftiko capability covering one Akamai business surface.'
  tags:
  - Akamai
  - Access tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: edgekv-access-tokens
    baseUri: https://{hostname}/edgekv/v1
    description: 'Akamai: EdgeKV API — Access tokens business capability. Self-contained, no shared references.'
    resources:
    - name: tokens
      path: /tokens
      operations:
      - name: posttokens
        method: POST
        description: Akamai Create an Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-w
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: gettokens
        method: GET
        description: Akamai List Access Tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: includeExpired
          in: query
          type: boolean
          description: Whether to include expired tokens that are less than 30 days old in the response.
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-w
    - name: tokens-tokenName
      path: /tokens/{tokenName}
      operations:
      - name: gettoken
        method: GET
        description: Akamai Download an Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-w
      - name: deletetoken
        method: DELETE
        description: Akamai Revoke an Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-w
  exposes:
  - type: rest
    namespace: edgekv-access-tokens-rest
    port: 8080
    description: 'REST adapter for Akamai: EdgeKV API — Access tokens. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.'
    resources:
    - path: /v1/tokens
      name: tokens
      description: REST surface for tokens.
      operations:
      - method: POST
        name: posttokens
        description: Akamai Create an Access Token
        call: edgekv-access-tokens.posttokens
        with:
          accountSwitchKey: rest.accountSwitchKey
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: gettokens
        description: Akamai List Access Tokens
        call: edgekv-access-tokens.gettokens
        with:
          includeExpired: rest.includeExpired
          accountSwitchKey: rest.accountSwitchKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tokens/{tokenname}
      name: tokens-tokenname
      description: REST surface for tokens-tokenName.
      operations:
      - method: GET
        name: gettoken
        description: Akamai Download an Access Token
        call: edgekv-access-tokens.gettoken
        with:
          accountSwitchKey: rest.accountSwitchKey
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetoken
        description: Akamai Revoke an Access Token
        call: edgekv-access-tokens.deletetoken
        with:
          accountSwitchKey: rest.accountSwitchKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: edgekv-access-tokens-mcp
    port: 9090
    transport: http
    description: 'MCP adapter for Akamai: EdgeKV API — Access tokens. One tool per consumed operation, routed inline through
      this capability''s consumes block.'
    tools:
    - name: akamai-create-access-token
      description: Akamai Create an Access Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: edgekv-access-tokens.posttokens
      with:
        accountSwitchKey: tools.accountSwitchKey
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: akamai-list-access-tokens
      description: Akamai List Access Tokens
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: edgekv-access-tokens.gettokens
      with:
        includeExpired: tools.includeExpired
        accountSwitchKey: tools.accountSwitchKey
      outputParameters:
      - type: object
        mapping: $.
    - name: akamai-download-access-token
      description: Akamai Download an Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: edgekv-access-tokens.gettoken
      with:
        accountSwitchKey: tools.accountSwitchKey
      outputParameters:
      - type: object
        mapping: $.
    - name: akamai-revoke-access-token
      description: Akamai Revoke an Access Token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: edgekv-access-tokens.deletetoken
      with:
        accountSwitchKey: tools.accountSwitchKey
      outputParameters:
      - type: object
        mapping: $.
