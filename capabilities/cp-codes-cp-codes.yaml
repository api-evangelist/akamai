naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: CP Codes and Reporting Groups API — CP codes'
  description: 'Akamai: CP Codes and Reporting Groups API — CP codes. 3 operations. Lead operation: Akamai List CP codes. Self-contained Naftiko capability covering one Akamai business
    surface.'
  tags:
  - Akamai
  - CP Codes
  - CP codes
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: cp-codes-cp-codes
    baseUri: https://{hostname}/cprg/v1
    description: 'Akamai: CP Codes and Reporting Groups API — CP codes business capability. Self-contained, no shared references.'
    resources:
    - name: cpcodes
      path: /cpcodes
      operations:
      - name: getget-cpcodes
        method: GET
        description: List CP codes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contractId
          in: query
          type: string
          description: Identifies the contract to filter data by. Include this optional parameter to narrow down the results to a specific contract only.
        - name: groupId
          in: query
          type: string
          description: Identifies the access group to filter data by. Include this optional parameter to narrow down the results to a specific access group only.
        - name: productId
          in: query
          type: string
          description: Identifies the product or service to filter data by. Include this optional parameter to narrow down the results to a specific product only.
        - name: cpcodeName
          in: query
          type: string
          description: The name of the CP code to filter data by. Include this optional parameter to narrow down the results to a specific CP code name only.
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
    - name: cpcodes-cpcodeId
      path: /cpcodes/{cpcodeId}
      operations:
      - name: getget-cpcode
        method: GET
        description: Get a CP code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
      - name: putput-cpcode
        method: PUT
        description: Update a CP code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
