    baseUri: https://{hostname}/appsec/v1
    description: 'Akamai: Application Security API — Client reputation business capability. Self-contained, no shared references.'
    resources:
    - name: configs-configId-versions-versionNumber-security-policies-po
      path: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/reputation-profiles
      operations:
      - name: getget-reputation-profiles-actions
        method: GET
        description: List reputation profile actions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
    - name: configs-configId-versions-versionNumber-security-policies-po
      path: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/reputation-profiles/{reputationProfileId}
      operations:
      - name: getget-reputation-profile-action
        method: GET
        description: Get the action for a reputation profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
