naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: Application Security API — Client reputation'
  description: 'Akamai: Application Security API — Client reputation. 3 operations. Lead operation: Akamai List reputation profile actions. Self-contained Naftiko capability covering
    one Akamai business surface.'
  tags:
  - Akamai
  - Application Security
  - Client reputation
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
