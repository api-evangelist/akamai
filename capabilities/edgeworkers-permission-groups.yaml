naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: EdgeWorkers API — Permission groups'
  description: 'Akamai: EdgeWorkers API — Permission groups. 2 operations. Lead operation: Akamai List Permission Groups.
    Self-contained Naftiko capability covering one Akamai business surface.'
  tags:
  - Akamai
  - Permission groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: edgeworkers-permission-groups
    baseUri: https://{hostname}/edgeworkers/v1
    description: 'Akamai: EdgeWorkers API — Permission groups business capability. Self-contained, no shared references.'
    resources:
    - name: groups
      path: /groups
      operations:
      - name: getgroups
        method: GET
        description: Akamai List Permission Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-w
    - name: groups-groupId
      path: /groups/{groupId}
      operations:
      - name: getgroup
        method: GET
        description: Akamai Get a Permission Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-w
  exposes:
  - type: rest
    namespace: edgeworkers-permission-groups-rest
    port: 8080
    description: 'REST adapter for Akamai: EdgeWorkers API — Permission groups. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.'
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: GET
        name: getgroups
        description: Akamai List Permission Groups
        call: edgeworkers-permission-groups.getgroups
        with:
          accountSwitchKey: rest.accountSwitchKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups/{groupid}
      name: groups-groupid
      description: REST surface for groups-groupId.
      operations:
      - method: GET
        name: getgroup
        description: Akamai Get a Permission Group
        call: edgeworkers-permission-groups.getgroup
        with:
          accountSwitchKey: rest.accountSwitchKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: edgeworkers-permission-groups-mcp
    port: 9090
    transport: http
    description: 'MCP adapter for Akamai: EdgeWorkers API — Permission groups. One tool per consumed operation, routed inline
      through this capability''s consumes block.'
    tools:
    - name: akamai-list-permission-groups
      description: Akamai List Permission Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: edgeworkers-permission-groups.getgroups
      with:
        accountSwitchKey: tools.accountSwitchKey
      outputParameters:
      - type: object
        mapping: $.
    - name: akamai-get-permission-group
      description: Akamai Get a Permission Group
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: edgeworkers-permission-groups.getgroup
      with:
        accountSwitchKey: tools.accountSwitchKey
      outputParameters:
      - type: object
        mapping: $.
