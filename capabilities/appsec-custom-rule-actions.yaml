naftiko: 1.0.0-alpha2
info:
  label: 'Akamai: Application Security API — Custom rule actions'
  description: 'Akamai: Application Security API — Custom rule actions. 2 operations. Lead operation: Akamai List custom rule actions. Self-contained Naftiko capability covering one
    Akamai business surface.'
  tags:
  - Akamai
  - Application Security
  - Custom rule actions
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    AKAMAI_API_KEY: AKAMAI_API_KEY
capability:
