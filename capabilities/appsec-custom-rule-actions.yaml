    namespace: appsec-custom-rule-actions
    baseUri: https://{hostname}/appsec/v1
    description: 'Akamai: Application Security API — Custom rule actions business capability. Self-contained, no shared references.'
    resources:
    - name: configs-configId-versions-versionNumber-security-policies-po
      path: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/custom-rules
      operations:
      - name: getget-custom-rules
        method: GET
        description: List custom rule actions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
    - name: configs-configId-versions-versionNumber-security-policies-po
      path: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/custom-rules/{ruleId}
      operations:
      - name: putput-custom-rule
        method: PUT
        description: Modify a custom rule action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountSwitchKey
          in: query
          type: string
          description: For customers who manage more than one account, this [runs the operation from another account](https://techdocs.akamai.com/developer/docs/manage-many-accounts-with-one-api-client).
            The Identity and
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
